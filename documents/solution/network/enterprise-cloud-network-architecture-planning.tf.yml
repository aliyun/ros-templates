ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  ecs_instance_type:
    Type: String
    Label:
      en: Instance Type
      zh-cn: 实例类型
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      InstanceChargeType: PostPaid
      SystemDiskCategory: cloud_essd
  instance_password:
    Type: String
    Label:
      en: Instance Password
      zh-cn: 实例密码
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters,
        lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol
        in)
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）
    AssociationProperty: ALIYUN::ECS::Instance::Password
    NoEcho: true
  zone1:
    Type: String
    Label:
      en: VSwitch Availability Zone1
      zh-cn: 交换机可用区1
    AssociationProperty: ALIYUN::ECS::Instance::ZoneId
  zone2:
    Type: String
    Label:
      en: VSwitch Availability Zone2
      zh-cn: 交换机可用区2
    Description:
      en: Please make sure that <font color='red'><b>VSwitch Availability Zone2 is different from VSwitch Availability Zone1</b></font>.
      zh-cn: 请确保<font color='red'><b>交换机可用区2与交换机可用区1不相同</b></font>。
    AssociationProperty: ALIYUN::ECS::Instance::ZoneId
  common_name:
    Type: String
    Default: enterprise-cloud
Rules:
  DifferentZones:
    Assertions:
    - Assert:
        Fn::Not:
          Fn::Equals:
          - Ref: zone1
          - Ref: zone2
      AssertDescription: Zones must be different.
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - zone1
          - zone2
        Label:
          default:
            en: Availability Zone
            zh-cn: 可用区配置
      - Parameters:
          - ecs_instance_type
          - instance_password
        Label:
          default:
            en: Instance
            zh-cn: ECS实例配置
    TemplateTags:
      - acs:technical-solution:network:企业云上网络架构规划-tech_solu_39
    Hidden:
      - common_name
Workspace:
  main.tf: |+
    resource "alicloud_vpc" "prd1" {
          vpc_name   = "${var.common_name}_VPC_PRD1"
          cidr_block = "192.168.0.0/16"
        }

        resource "alicloud_vswitch" "prd1_z1" {
          vpc_id            = alicloud_vpc.prd1.id
          cidr_block        = "192.168.0.0/24"
          availability_zone = var.zone1
          vswitch_name      = "${var.common_name}_vsw_001"
        }

        resource "alicloud_vswitch" "prd1_z2" {
          vpc_id            = alicloud_vpc.prd1.id
          cidr_block        = "192.168.100.0/24"
          availability_zone = var.zone2
          vswitch_name      = "${var.common_name}_vsw_001_bak"
        }

        resource "alicloud_vpc" "prd2" {
          vpc_name   = "${var.common_name}_VPC_PRD2"
          cidr_block = "192.168.0.0/16"
        }

        resource "alicloud_vswitch" "prd2_z1" {
          vpc_id            = alicloud_vpc.prd2.id
          cidr_block        = "192.168.1.0/24"
          availability_zone = var.zone1
          vswitch_name      = "${var.common_name}_vsw_002"
        }

        resource "alicloud_vswitch" "prd2_z2" {
          vpc_id            = alicloud_vpc.prd2.id
          cidr_block        = "192.168.101.0/24"
          availability_zone = var.zone2
          vswitch_name      = "${var.common_name}_vsw_002_bak"
        }

        resource "alicloud_vpc" "prd3" {
          vpc_name   = "${var.common_name}_VPC_PRD3"
          cidr_block = "192.168.0.0/16"
        }

        resource "alicloud_vswitch" "prd3_z1" {
          vpc_id            = alicloud_vpc.prd3.id
          cidr_block        = "192.168.2.0/24"
          availability_zone = var.zone1
          vswitch_name      = "${var.common_name}_vsw_003"
        }

        resource "alicloud_vswitch" "prd3_z2" {
          vpc_id            = alicloud_vpc.prd3.id
          cidr_block        = "192.168.102.0/24"
          availability_zone = var.zone2
          vswitch_name      = "${var.common_name}_vsw_003_bak"
        }

        resource "alicloud_vpc" "sec" {
          vpc_name   = "${var.common_name}_VPC_SEC"
          cidr_block = "172.16.0.0/12"
        }

        resource "alicloud_vswitch" "sec_z1_004" {
          vpc_id            = alicloud_vpc.sec.id
          cidr_block        = "172.16.0.0/25"
          availability_zone = var.zone1
          vswitch_name      = "${var.common_name}_vsw_004"
        }

        resource "alicloud_vswitch" "sec_z1_005" {
          vpc_id            = alicloud_vpc.sec.id
          cidr_block        = "172.16.128.0/25"
          availability_zone = var.zone1
          vswitch_name      = "${var.common_name}_vsw_005"
        }

        resource "alicloud_vswitch" "sec_z2_005" {
          vpc_id            = alicloud_vpc.sec.id
          cidr_block        = "172.16.200.0/25"
          availability_zone = var.zone2
          vswitch_name      = "${var.common_name}_vsw_004_bak"
        }

        resource "alicloud_security_group" "prd1" {
          name        = "${var.common_name}_SG_For_VPC_PRD1"
          vpc_id      = alicloud_vpc.prd1.id
          description = "Security group for PRD1"
        }

        resource "alicloud_security_group_rule" "prd1_ingress" {
          type              = "ingress"
          ip_protocol       = "tcp"
          port_range        = "3389/3389"
          security_group_id = alicloud_security_group.prd1.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group_rule" "prd1_egress_intranet" {
          type              = "egress"
          ip_protocol       = "all"
          port_range        = "-1/-1"
          security_group_id = alicloud_security_group.prd1.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group" "prd2" {
          name        = "${var.common_name}_SG_For_VPC_PRD2"
          vpc_id      = alicloud_vpc.prd2.id
          description = "Security group for PRD2"
        }

        resource "alicloud_security_group" "prd3" {
          name        = "${var.common_name}_SG_For_VPC_PRD3"
          vpc_id      = alicloud_vpc.prd3.id
          description = "Security group for PRD3"
        }

        resource "alicloud_security_group" "sec" {
          name        = "${var.common_name}_SG_For_VPC_SEC"
          vpc_id      = alicloud_vpc.sec.id
          description = "Security group for SEC"
        }

        resource "alicloud_security_group_rule" "prd2_ingress" {
          type              = "ingress"
          ip_protocol       = "tcp"
          port_range        = "3389/3389"
          security_group_id = alicloud_security_group.prd2.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group_rule" "prd2_egress_intranet" {
          type              = "egress"
          ip_protocol       = "all"
          port_range        = "-1/-1"
          security_group_id = alicloud_security_group.prd2.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group_rule" "prd3_ingress" {
          type              = "ingress"
          ip_protocol       = "tcp"
          port_range        = "3389/3389"
          security_group_id = alicloud_security_group.prd3.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group_rule" "prd3_egress_intranet" {
          type              = "egress"
          ip_protocol       = "all"
          port_range        = "-1/-1"
          security_group_id = alicloud_security_group.prd3.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        resource "alicloud_security_group_rule" "sec_ingress" {
          type              = "ingress"
          ip_protocol       = "tcp"
          port_range        = "3389/3389"
          security_group_id = alicloud_security_group.sec.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }
        resource "alicloud_security_group_rule" "sec_egress_intranet" {
          type              = "egress"
          ip_protocol       = "all"
          port_range        = "-1/-1"
          security_group_id = alicloud_security_group.sec.id
          cidr_ip           = "0.0.0.0/0"
          priority          = 1
          nic_type          = "intranet"
        }

        # 获取阿里云官方镜像
        data "alicloud_images" "image_id" {
          name_regex  = "^aliyun_3_9_x64_20G*"
          owners      = "system"  # 官方镜像
          most_recent = true      # 获取最新版本
        }

        resource "alicloud_instance" "app001" {
          instance_name        = "${var.common_name}_APP001"
          image_id             = data.alicloud_images.image_id.images[0].id
          instance_type        = var.ecs_instance_type
          security_groups      = [alicloud_security_group.prd1.id]
          vswitch_id           = alicloud_vswitch.prd1_z1.id
          system_disk_category = "cloud_essd"
          system_disk_size     = 40
          password             = var.instance_password
          allocate_public_ip   = false
          instance_charge_type = "PostPaid"
        }

        resource "alicloud_instance" "app002" {
          instance_name        = "${var.common_name}_APP002"
          image_id             = data.alicloud_images.image_id.images[0].id
          instance_type        = var.ecs_instance_type
          security_groups      = [alicloud_security_group.prd2.id]
          vswitch_id           = alicloud_vswitch.prd2_z1.id
          system_disk_category = "cloud_essd"
          system_disk_size     = 40
          password             = var.instance_password
          allocate_public_ip   = false
          instance_charge_type = "PostPaid"
        }

        resource "alicloud_instance" "app003" {
          instance_name        = "${var.common_name}_APP003"
          image_id             = data.alicloud_images.image_id.images[0].id
          instance_type        = var.ecs_instance_type
          security_groups      = [alicloud_security_group.prd3.id]
          vswitch_id           = alicloud_vswitch.prd3_z1.id
          system_disk_category = "cloud_essd"
          system_disk_size     = 40
          password             = var.instance_password
          allocate_public_ip   = false
          instance_charge_type = "PostPaid"
        }

        resource "alicloud_instance" "sec001" {
          instance_name        = "${var.common_name}_SEC001"
          image_id             = data.alicloud_images.image_id.images[0].id
          instance_type        = var.ecs_instance_type
          security_groups      = [alicloud_security_group.sec.id]
          vswitch_id           = alicloud_vswitch.sec_z1_004.id
          system_disk_category = "cloud_essd"
          system_disk_size     = 40
          password             = var.instance_password
          allocate_public_ip   = false
          instance_charge_type = "PostPaid"
        }

        resource "alicloud_network_interface" "eni_sec" {
          vswitch_id          = alicloud_vswitch.sec_z1_005.id
          security_group_ids  = [alicloud_security_group.sec.id]
          name                = "${var.common_name}_Eni_for_SEC"
        }

        resource "alicloud_network_interface_attachment" "eni_sec_attach" {
          instance_id          = alicloud_instance.sec001.id
          network_interface_id = alicloud_network_interface.eni_sec.id
        }

        resource "alicloud_cen_instance" "main" {
          name        = "${var.common_name}_cen"
          description = "Created by Terraform for enterprise cloud network architecture."
        }

        resource "alicloud_cen_transit_router" "main" {
          cen_id = alicloud_cen_instance.main.id
        }

        # CEN 附件 (Attachments)
        resource "alicloud_cen_transit_router_vpc_attachment" "prd1" {
          vpc_id            = alicloud_vpc.prd1.id
          transit_router_id = alicloud_cen_transit_router.main.transit_router_id
          zone_mappings {
            zone_id     = var.zone1
            vswitch_id  = alicloud_vswitch.prd1_z1.id
          }
          zone_mappings {
            zone_id     = var.zone2
            vswitch_id  = alicloud_vswitch.prd1_z2.id
          }
          force_delete =  true
          route_table_propagation_enabled = false
          route_table_association_enabled = true
        }

        resource "alicloud_cen_transit_router_vpc_attachment" "prd2" {
          vpc_id            = alicloud_vpc.prd2.id
          transit_router_id = alicloud_cen_transit_router.main.transit_router_id
          zone_mappings {
            zone_id     = var.zone1
            vswitch_id  = alicloud_vswitch.prd2_z1.id
          }
          zone_mappings {
            zone_id     = var.zone2
            vswitch_id  = alicloud_vswitch.prd2_z2.id
          }
          force_delete =  true
          route_table_propagation_enabled = false
          route_table_association_enabled = true
        }

        resource "alicloud_cen_transit_router_vpc_attachment" "prd3" {
          vpc_id            = alicloud_vpc.prd3.id
          transit_router_id = alicloud_cen_transit_router.main.transit_router_id
          zone_mappings {
            zone_id     = var.zone1
            vswitch_id  = alicloud_vswitch.prd3_z1.id
          }
          zone_mappings {
            zone_id     = var.zone2
            vswitch_id  = alicloud_vswitch.prd3_z2.id
          }
          force_delete =  true
          route_table_propagation_enabled = false
          route_table_association_enabled = true
        }

        resource "alicloud_cen_transit_router_vpc_attachment" "sec" {
          vpc_id            = alicloud_vpc.sec.id
          transit_router_id = alicloud_cen_transit_router.main.transit_router_id
          zone_mappings {
            zone_id     = var.zone1
            vswitch_id  = alicloud_vswitch.sec_z1_005.id
          }
          zone_mappings {
            zone_id     = var.zone2
            vswitch_id  = alicloud_vswitch.sec_z2_005.id
          }
          force_delete =  true
          route_table_propagation_enabled = false
          route_table_association_enabled = false
        }

        resource "alicloud_cen_transit_router_route_table" "custom" {
          transit_router_id              = alicloud_cen_transit_router.main.transit_router_id
          transit_router_route_table_name = "TR_1"
          depends_on = [
            alicloud_cen_transit_router_vpc_attachment.prd1,
            alicloud_cen_transit_router_vpc_attachment.prd2,
            alicloud_cen_transit_router_vpc_attachment.prd3,
            alicloud_cen_transit_router_vpc_attachment.sec
          ]
        }

        resource "alicloud_cen_transit_router_route_table_association" "sec_assoc" {
          transit_router_attachment_id  = alicloud_cen_transit_router_vpc_attachment.sec.transit_router_attachment_id
          transit_router_route_table_id = alicloud_cen_transit_router_route_table.custom.transit_router_route_table_id
        }

        resource "alicloud_cen_transit_router_route_entry" "default_to_sec" {
          transit_router_route_table_id          = alicloud_cen_transit_router_route_table.custom.transit_router_route_table_id
          transit_router_route_entry_destination_cidr_block = "0.0.0.0/0"
          transit_router_route_entry_next_hop_id            = alicloud_cen_transit_router_vpc_attachment.sec.transit_router_attachment_id
          transit_router_route_entry_next_hop_type          = "Attachment"
          depends_on = [alicloud_cen_transit_router_route_table_association.sec_assoc]
        }

        resource "alicloud_cen_transit_router_route_table_propagation" "prd1_prop" {
          transit_router_attachment_id  = alicloud_cen_transit_router_vpc_attachment.prd1.transit_router_attachment_id
          transit_router_route_table_id = alicloud_cen_transit_router_route_table.custom.transit_router_route_table_id
          depends_on = [alicloud_cen_transit_router_route_entry.default_to_sec]
        }

        resource "alicloud_cen_transit_router_route_table_propagation" "prd2_prop" {
          transit_router_attachment_id  = alicloud_cen_transit_router_vpc_attachment.prd2.transit_router_attachment_id
          transit_router_route_table_id = alicloud_cen_transit_router_route_table.custom.transit_router_route_table_id
          depends_on = [alicloud_cen_transit_router_route_entry.default_to_sec]
        }

        resource "alicloud_cen_transit_router_route_table_propagation" "sec_prop" {
          transit_router_attachment_id  = alicloud_cen_transit_router_vpc_attachment.sec.transit_router_attachment_id
          transit_router_route_table_id = alicloud_cen_transit_router_route_table.custom.transit_router_route_table_id
          depends_on = [alicloud_cen_transit_router_route_entry.default_to_sec]
        }

        resource "alicloud_route_table" "sec_custom" {
          vpc_id        = alicloud_vpc.sec.id
          route_table_name = "Custom"
          depends_on = [
            alicloud_cen_transit_router_route_table_propagation.prd1_prop,
            alicloud_cen_transit_router_route_table_propagation.prd2_prop,
            alicloud_cen_transit_router_route_table_propagation.sec_prop
          ]
        }

        resource "alicloud_route_table_attachment" "sec_vsw_assoc" {
          vswitch_id    = alicloud_vswitch.sec_z1_004.id
          route_table_id = alicloud_route_table.sec_custom.id
        }

        resource "alicloud_route_entry" "to_ecs" {
          route_table_id  = alicloud_vpc.sec.route_table_id
          destination_cidrblock = "0.0.0.0/0"
          nexthop_type   = "Instance"
          nexthop_id     = alicloud_instance.sec001.id
          depends_on      = [alicloud_route_table_attachment.sec_vsw_assoc]
        }

        resource "alicloud_route_entry" "to_cen" {
          route_table_id  = alicloud_route_table.sec_custom.id
          destination_cidrblock = "0.0.0.0/0"
          nexthop_type   = "Attachment"
          nexthop_id     = alicloud_cen_transit_router_vpc_attachment.sec.transit_router_attachment_id
          depends_on      = [
            alicloud_route_entry.to_ecs,
            alicloud_cen_transit_router_vpc_attachment.sec
          ]
        }

        # 定义本地变量common_name
        locals {
          ecs_command = <<SHELL
        #!/bin/bash
        echo 1 > /proc/sys/net/ipv4/ip_forward
        SHELL
        }

        resource "alicloud_ecs_command" "enable_ipv4" {
          name             = "${var.common_name}_Enable_IPv4_Forward"
          type             = "RunShellScript"
          command_content  = base64encode(local.ecs_command)
          timeout          = 3600
          working_dir      = "/root"
        }

        resource "alicloud_ecs_invocation" "invoke_enable_ipv4" {
          command_id  = alicloud_ecs_command.enable_ipv4.id
          instance_id = [alicloud_instance.sec001.id]
          timeouts {
            create = "60m"
          }
        }
  variable.tf: |-  
    variable "common_name" {
      type        = string
      description = "资源名称前缀"
      default     = "enterprise-cloud"
    }
    
    variable "ecs_instance_type" {
      type        = string
      description = "实例规格"
    }
    
    variable "instance_password" {
      type        = string
      description = "实例密码，长度 8-30，必须包含三项（大写字母、小写字母、数字、特殊符号）"
      sensitive   = true
    }
    
    variable "zone1" {
      type        = string
      description = "交换机可用区 1"
    }
    
    variable "zone2" {
      type        = string
      description = "交换机可用区 2 (必须与可用区 1 不同)"
    }
    
    check "different_zones" {
      assert {
        condition     = var.zone1 != var.zone2
        error_message = "交换机可用区 2 必须与交换机可用区 1 不相同。"
      }
    }

  output.tf: |+
    output "EcsInstances" {
      description = "查看创建的 ECS 实例列表"
      value       = "https://ecs.console.aliyun.com/server/region/${substr(var.zone1, 0, length(var.zone1) - 2)}?instanceIds=${alicloud_instance.app001.id},${alicloud_instance.app002.id},${alicloud_instance.app003.id},${alicloud_instance.sec001.id}"
    }