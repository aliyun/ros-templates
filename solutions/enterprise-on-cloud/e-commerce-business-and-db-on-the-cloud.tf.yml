ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  ECS_ZoneId_1:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Label:
      zh-cn: ECS可用区A
      en: Availability Zone A of ECS
    Description:
      en: An availability zone to create for the ECS instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.
      zh-cn: 创建ECS实例的可用区，<font color='red'><b>请确保当前地域有至少两个不同的可用区可供选择</b></font>。若无双可用区，请修改其他参数或切换至其他地域后重新查看。
  ECS_ZoneId_2:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Label:
      zh-cn: ECS可用区B
      en: Availability Zone B of ECS
    Description:
      en: An availability zone to create for the ECS instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.
      zh-cn: 创建ECS实例的可用区，<font color='red'><b>请确保当前地域有至少两个不同的可用区可供选择</b></font>。若无双可用区，请修改其他参数或切换至其他地域后重新查看。
  RDS_ZoneId_1:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Label:
      zh-cn: RDS主可用区
      en: Master availability zone
    Description:
      en: The master availability zone to create for the RDS instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.
      zh-cn: 创建RDS实例的主可用区，<font color='red'><b>请确保当前地域有至少两个不同的可用区可供选择</b></font>。若无双可用区，请修改其他参数或切换至其他地域后重新查看。
  RDS_ZoneId_2:
    Type: String
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
    Label:
      zh-cn: RDS备可用区
      en: Slave availability zone
    Description:
      en: The slave availability zone to create for the RDS instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.
      zh-cn: 创建RDS实例的备可用区，<font color='red'><b>请确保当前地域有至少两个不同的可用区可供选择</b></font>。若无双可用区，请修改其他参数或切换至其他地域后重新查看。
  InstanceType:
    Type: String
    Label:
      en: ECS Instance Type
      zh-cn: ECS实例规格
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AllowedPattern: ecs.u1.*
  SystemDiskCategory:
    Type: String
    Default: cloud_essd
    Label:
      en: System disk type
      zh-cn: 系统盘类型
  Password:
    Type: String
    Label:
      en: ECS instance password
      zh-cn: ECS实例密码
    Description:
      en: 'Length 8-32 characters, can contain size letters, Numbers and special symbols, including: !@#$%^&*()_+-='
      zh-cn: 长度8-32个字符,可包含大小字母、数字及特殊符号（包含：!@#$%^&*()_+-=）
    ConstraintDescription:
      en: '8-32 characters, can contain size letters, Numbers and special symbols, including: !@#$%^&*()_+-='
      zh-cn: 8-32个字符,可包含大小字母、数字及特殊符号（包含：!@#$%^&*()_+-=）
    MinLength: 8
    MaxLength: 32
    NoEcho: true
  DBInstanceClass:
    Type: String
    Label:
      en: Specifications
      zh-cn: 规格
    Description:
      en: 'Select the instance specification based on the type of database engine and the available area support;<br>see detail: <a href=''https://www.alibabacloud.com/help/doc-detail/26312.html'' target=''_blank''><b><font color=''blue''>Instance specification sheet</font></b></a>'
      zh-cn: 根据数据库引擎的类型和可用的区域支持选择实例规格；<br>请参见详细信息：<a href='https://help.aliyun.com/document_detail/26312.html' target='_blank'><b><font color='blue'>实例规格表</font></b></a>
    Default: rds.mysql.s2.large
  DBPassword:
    Type: String
    Label:
      en: Database password
      zh-cn: 数据库密码
    Description:
      en: 'Length 8-32 characters, can contain size letters, Numbers and special symbols, including: !@#$%^&*()_+-= <br>It applies to both the password of the self-built database on ECS and the password of RDS.'
      zh-cn: 长度8-32个字符,可包含大小字母、数字及特殊符号（包含：!@#$%^&*()_+-=）<br>同时适用于ECS上自建数据库的密码与RDS的密码。
    ConstraintDescription:
      en: '8-32 characters, can contain size letters, Numbers and special symbols, including: !@#$%^&*()_+-='
      zh-cn: 8-32个字符,可包含大小字母、数字及特殊符号（包含：!@#$%^&*()_+-=）
    MinLength: 8
    MaxLength: 32
    NoEcho: true
  LoadBalancerSpec:
    Type: String
    Label:
      en: Load balancer instance specification
      zh-cn: 负载均衡实例规格
    Default: slb.s1.small
    AssociationProperty: ALIYUN::SLB::Instance::InstanceType
  SLB_ZoneId_1:
    Type: String
    AssociationProperty: ALIYUN::NLB::Zone::ZoneId
    Label:
      zh-cn: SLB主可用区
      en: Master availability zone
    Description:
      en: The master availability zone to create for the SLB instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.
      zh-cn: 创建SLB实例的主可用区，<font color='red'><b>请确保当前地域有至少两个不同的可用区可供选择</b></font>。若无双可用区，请修改其他参数或切换至其他地域后重新查看。
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - InstanceType
          - SystemDiskCategory
          - ECS_ZoneId_1
          - ECS_ZoneId_2
          - Password
        Label:
          default: ECS
      - Parameters:
          - DBInstanceClass
          - RDS_ZoneId_1
          - RDS_ZoneId_2
          - DBPassword
        Label:
          default: RDS
      - Parameters:
          - LoadBalancerSpec
          - SLB_ZoneId_1
        Label:
          default: SLB
    TemplateTags:
      - acs:technical-solution:network:电商行业业务及数据库上云
Workspace:
  main.tf: |+
    data "alicloud_regions" "current_region_for_pseudo_parameter_bc7a6500" {
      current = true
    }
    
    data "alicloud_images" "image_id" {
      name_regex  = "^centos*"
      owners      = "system"  # 官方镜像
      most_recent = true      # 获取最新版本
    }

    resource "alicloud_vpc" "vpc" {
      vpc_name   = "E_Commerce_Vpc"
      cidr_block = "192.168.0.0/16"
    }

    resource "alicloud_vswitch" "ecs_vsw_1" {
      vpc_id     = alicloud_vpc.vpc.id
      zone_id    = var.ECS_ZoneId_1
      cidr_block = "192.168.0.0/24"
    }

    resource "alicloud_vswitch" "ecs_vsw_2" {
      vpc_id     = alicloud_vpc.vpc.id
      zone_id    = var.ECS_ZoneId_2
      cidr_block = "192.168.1.0/24"
    }

    resource "alicloud_vswitch" "slb_vsw_1" {
      vpc_id     = alicloud_vpc.vpc.id
      zone_id    = var.SLB_ZoneId_1
      cidr_block = "192.168.2.0/24"
    }

    resource "alicloud_vswitch" "rds_vsw_1" {
      vpc_id     = alicloud_vpc.vpc.id
      zone_id    = var.RDS_ZoneId_1
      cidr_block = "192.168.3.0/24"
    }

    resource "alicloud_vswitch" "rds_vsw_2" {
      vpc_id     = alicloud_vpc.vpc.id
      zone_id    = var.RDS_ZoneId_2
      cidr_block = "192.168.4.0/24"
    }

    resource "alicloud_security_group" "ecommerce_sg" {
      vpc_id = alicloud_vpc.vpc.id
    }

    resource "alicloud_security_group" "wordpress_sg" {
      vpc_id = alicloud_vpc.vpc.id
    }

    resource "alicloud_instance" "ds_demo_ecs_0" {
      vpc_id               = alicloud_vpc.vpc.id
      security_groups      = [alicloud_security_group.ecommerce_sg.id]
      vswitch_id           = alicloud_vswitch.ecs_vsw_1.id
      instance_name        = "ecs-ds-demo-01"
      availability_zone    = var.ECS_ZoneId_1
      instance_charge_type = "PostPaid"
      instance_type        = var.InstanceType
      image_id             = data.alicloud_images.image_id.images[0].id
      system_disk_category = var.SystemDiskCategory
      system_disk_size     = 40
      password             = var.Password
    }

    resource "alicloud_instance" "ds_demo_ecs_1" {
      vpc_id               = alicloud_vpc.vpc.id
      security_groups      = [alicloud_security_group.ecommerce_sg.id]
      vswitch_id           = alicloud_vswitch.ecs_vsw_2.id
      instance_name        = "ecs-ds-demo-02"
      availability_zone    = var.ECS_ZoneId_2
      instance_charge_type = "PostPaid"
      instance_type        = var.InstanceType
      image_id             = data.alicloud_images.image_id.images[0].id
      system_disk_category = var.SystemDiskCategory
      system_disk_size     = 40
      password             = var.Password
    }

    resource "alicloud_slb_load_balancer" "slb" {
      load_balancer_spec = var.LoadBalancerSpec
      vswitch_id         = alicloud_vswitch.slb_vsw_1.id
      load_balancer_name = "slb-ds-demo"
      master_zone_id     = var.SLB_ZoneId_1
    }

    resource "alicloud_slb_listener" "slb_listener" {
      frontend_port    = 80
      bandwidth        = -1
      load_balancer_id = alicloud_slb_load_balancer.slb.id
      backend_port     = 80
      protocol         = "tcp"
    }

    resource "alicloud_slb_attachment" "slb_backend_server_attachment" {
      load_balancer_id = alicloud_slb_load_balancer.slb.id
      instance_ids = [
        alicloud_instance.ds_demo_ecs_0.id,
        alicloud_instance.ds_demo_ecs_1.id
      ]
      weight = 100
    }

    resource "alicloud_instance" "wordpress_demo_ecs" {
      vpc_id               = alicloud_vpc.vpc.id
      security_groups      = [alicloud_security_group.ecommerce_sg.id]
      vswitch_id           = alicloud_vswitch.ecs_vsw_2.id
      instance_name        = "ecs-demo-wordpress"
      availability_zone    = var.ECS_ZoneId_2
      instance_charge_type = "PostPaid"
      instance_type        = var.InstanceType
      image_id             = data.alicloud_images.image_id.images[0].id
      system_disk_category = var.SystemDiskCategory
      system_disk_size     = 40
      password             = var.Password
    }

    resource "alicloud_eip_address" "eip_0" {
      bandwidth            = 2
      instance_charge_type = "PostPaid"
      internet_charge_type = "PayByTraffic"
    }

    resource "alicloud_eip_address" "eip_1" {
      bandwidth            = 2
      instance_charge_type = "PostPaid"
      internet_charge_type = "PayByTraffic"
    }

    resource "alicloud_eip_association" "vpc_eip_association_0" {
      instance_id   = alicloud_slb_load_balancer.slb.id
      allocation_id = alicloud_eip_address.eip_0.id
    }

    resource "alicloud_eip_association" "vpc_eip_association_1" {
      instance_id   = alicloud_instance.wordpress_demo_ecs.id
      allocation_id = alicloud_eip_address.eip_1.id
    }

    resource "alicloud_ecs_command" "install_mysql_run_command_alicloud_ecs_command" {
      type            = "RunShellScript"
      timeout         = 600
      command_content = "#!/bin/bash\nwget http://repo.mysql.com/mysql-community-release-el7-5.noarch.rpm\nrpm -ivh mysql-community-release-el7-5.noarch.rpm\nyum install mysql-server -y\nsystemctl start mysqld\n# 生成MySQL root用户，设置密码\nMYSQL_PASSWD=\"${var.DBPassword}\"\nservice mysqld start\nyum install expect -y\necho '#!/usr/bin/expect' > dbroot.sh\necho set timeout 60 >> dbroot.sh\necho 'set password [lindex $argv 0]' >> dbroot.sh\necho spawn mysql_secure_installation >> dbroot.sh\necho expect { >> dbroot.sh\necho '\"Press y|Y for Yes\" { send \"Y\r\"; exp_continue}' >> dbroot.sh\necho '\"password:\" { send \"${var.DBPassword}\r\"; exp_continue}' >> dbroot.sh\necho '\"Please enter 0 = LOW, 1 = MEDIUM and 2 = STRONG:\" { send \"0\r\"; exp_continue}' >> dbroot.sh\necho '\"Cleaning up\" { send \"\r\"}' >> dbroot.sh\necho } >> dbroot.sh\necho interact >> dbroot.sh\nchmod +x dbroot.sh\n./dbroot.sh\n# 生成DTS用户\necho 'create database \"wordpress\";' > setup.mysql\necho 'create user \"\"dts_user\"\" identified by \"${var.DBPassword}\";' >> setup.mysql\necho 'GRANT ALL ON *.* TO \"\"dts_user\"\"@\"%\";' >> setup.mysql\necho 'flush privileges;' >> setup.mysql\nchmod +x setup.mysql\nmysql -uroot -p${var.DBPassword} < setup.mysql\n# 添加测试数据\necho 'use \"wordpress\"' > setup_data.mysql\necho 'CREATE TABLE \"demo_table\" ( ' >> setup_data.mysql\necho 'buyer_id varchar(32) DEFAULT NULL, ' >> setup_data.mysql\necho 'buyer_prov varchar(32) DEFAULT NULL, ' >> setup_data.mysql\necho 'gender varchar(32) DEFAULT NULL, ' >> setup_data.mysql\necho 'age_range varchar(32) DEFAULT NULL, ' >> setup_data.mysql\necho 'zodiac varchar(32) DEFAULT NULL ' >> setup_data.mysql\necho ') ENGINE=InnoDB DEFAULT CHARSET=utf8;' >> setup_data.mysql\necho 'insert into \"demo_table\" ( buyer_id, buyer_prov, gender, age_range, zodiac ) values' >> setup_data.mysql\necho '(\"0001\",\"A\",\"Male\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0002\",\"B\",\"Male\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0003\",\"C\",\"Female\",\"30-40\" ,\"by\"),' >> setup_data.mysql\necho '(\"0004\",\"D\",\"Male\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0005\",\"E\",\"Male\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0006\",\"F\",\"Female\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0007\",\"G\",\"Female\",\"10-20\" ,\"by\"),' >> setup_data.mysql\necho '(\"0008\",\"H\",\"Female\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0009\",\"I\",\"Male\",\"20-30\" ,\"by\"),' >> setup_data.mysql\necho '(\"0010\",\"J\",\"Male\",\"20-30\" ,\"by\");' >> setup_data.mysql\nchmod +x setup_data.mysql\nmysql -uroot -p${var.DBPassword} < setup_data.mysql"
      name            = "auto-2db04228"
      depends_on = [
        alicloud_eip_association.vpc_eip_association_1
      ]
    }

    resource "alicloud_ecs_invocation" "install_mysql_run_command_alicloud_ecs_invocation" {
      instance_id = [alicloud_instance.wordpress_demo_ecs.id]
      command_id  = alicloud_ecs_command.install_mysql_run_command_alicloud_ecs_command.id
      depends_on = [
        alicloud_eip_association.vpc_eip_association_1
      ]
    }

    resource "alicloud_db_instance" "rds_db_instance" {
      category                 = "HighAvailability"
      db_instance_storage_type = "local_ssd"
      zone_id                  = var.RDS_ZoneId_1
      vpc_id                   = alicloud_vpc.vpc.id
      vswitch_id = join(",", [
        alicloud_vswitch.rds_vsw_1.id,
        alicloud_vswitch.rds_vsw_2.id
      ])
      instance_type     = var.DBInstanceClass
      instance_storage  = 100
      engine            = "MySQL"
      engine_version    = "5.6"
      security_ips      = ["192.168.0.0/16"]
      security_group_id = alicloud_security_group.ecommerce_sg.id
    }

    resource "alicloud_dts_instance" "dts_instance" {
      // JobId transform failed: Could not transform ROS attribute MigrationJob.DtsJobId to Terraform attribute. Args: ['MigrationJob', 'DtsJobId']
      instance_class                   = "small"
      type                             = "migration"
      source_region                    = data.alicloud_regions.current_region_for_pseudo_parameter_bc7a6500.ids[0]
      destination_region               = data.alicloud_regions.current_region_for_pseudo_parameter_bc7a6500.ids[0]
      source_endpoint_engine_name      = "MySQL"
      destination_endpoint_engine_name = "MySQL"
      payment_type                     = "PayAsYouGo"
    }

    resource "alicloud_dts_migration_job" "migration_job" {
      depends_on = [
        alicloud_db_instance.rds_db_instance,
        alicloud_ecs_command.install_mysql_run_command_alicloud_ecs_command, alicloud_ecs_invocation.install_mysql_run_command_alicloud_ecs_invocation
      ]

      dts_instance_id                    = alicloud_dts_instance.dts_instance.id
      dts_job_name = "e-commerce_migration"
      source_endpoint_instance_type      = "ECS"
      source_endpoint_instance_id        = alicloud_instance.wordpress_demo_ecs.id
      source_endpoint_engine_name        = "MySQL"
      source_endpoint_region             = data.alicloud_regions.current_region_for_pseudo_parameter_bc7a6500.ids[0]
      source_endpoint_user_name          = "dts_user"
      source_endpoint_password           = var.DBPassword
      destination_endpoint_instance_type = "RDS"
      destination_endpoint_instance_id   = alicloud_db_instance.rds_db_instance.id
      destination_endpoint_engine_name   = "MySQL"
      destination_endpoint_region        = data.alicloud_regions.current_region_for_pseudo_parameter_bc7a6500.ids[0]
      destination_endpoint_user_name     = "myuser"
      destination_endpoint_password      = var.DBPassword
      db_list = jsonencode({
          "wordpress" = { name = "wordpress_new", all = true }
        })
      structure_initialization = true
      data_initialization      = true
      data_synchronization     = true

    }

    resource "alicloud_security_group_rule" "ecommerce_sg_security_group_ingress_0_5e313496" {
      port_range        = "80/80"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.ecommerce_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "ecommerce_sg_security_group_ingress_1_0b654e8f" {
      port_range        = "443/443"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.ecommerce_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "ecommerce_sg_security_group_ingress_2_a0a134c5" {
      port_range        = "3389/3389"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.ecommerce_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "ecommerce_sg_security_group_ingress_3_b26601d6" {
      port_range        = "-1/-1"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "icmp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.ecommerce_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "wordpress_sg_security_group_ingress_0_dd0a93ed" {
      port_range        = "80/80"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.wordpress_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "wordpress_sg_security_group_ingress_1_d1ecb8b8" {
      port_range        = "443/443"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.wordpress_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "wordpress_sg_security_group_ingress_2_a7ebdcb5" {
      port_range        = "3306/3306"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "tcp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.wordpress_sg.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "wordpress_sg_security_group_ingress_3_bf0355a1" {
      port_range        = "-1/-1"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "icmp"
      nic_type          = "intranet"
      security_group_id = alicloud_security_group.wordpress_sg.id
      type              = "ingress"
    }

  output.tf: |+
    output "ecs_login_address" {
      value       = "https://ecs-workbench.aliyun.com/?from=EcsConsole&instanceType=ecs&regionId=${data.alicloud_regions.current_region_for_pseudo_parameter_bc7a6500.ids[0]}&instanceId=${alicloud_instance.wordpress_demo_ecs.id}"
      description = <<EOT
      {
        "zh-cn": "ECS登陆地址。",
        "en": "Ecs login address."
      }
      EOT
    }

    output "dbinstance_id" {
      value       = alicloud_db_instance.rds_db_instance.id
      description = <<EOT
      {
        "zh-cn": "RDS实例ID。",
        "en": "RDS instance id."
      }
      EOT
    }

  variable.tf: |+
    variable "ECS_ZoneId_1" {
      type        = string
      description = <<EOT
      {
        "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId",
        "Label": {
          "zh-cn": "ECS可用区A",
          "en": "Availability Zone A of ECS"
        },
        "Description": {
          "en": "An availability zone to create for the ECS instance, <font color='red'><b>ensure that the current region has at least two different availability zones to choose from</b>. If there are no two availability zones, please change other parameters or switch to another region and check again.",
