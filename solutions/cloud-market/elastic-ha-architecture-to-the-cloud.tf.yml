ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  VpcCidrBlock:
    Type: String
    Label:
      en: VPC CIDR Block
      zh-cn: 专有网络网段
    Description:
      en: 'The IP address range of the VPC in the CIDR Block form; <br>You can use the following IP address ranges: <br><font color=''green''>[10.0.0.0/8]</font><br><font color=''green''>[172.16.0.0/12]</font><br><font color=''green''>[192.168.0.0/16]</font>'
      zh-cn: 专有网络IP地址段范围，<br>您可以使用以下的IP地址段:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>
    Default: 192.168.0.0/16
    AllowedValues:
      - 192.168.0.0/16
      - 172.16.0.0/12
      - 10.0.0.0/8
  VSwitchZoneId1:
    Type: String
    Label:
      en: VSwitch 1 Available Zone
      zh-cn: 交换机1可用区
    Description:
      en: Availability Zone ID,<br><b>note： <font color='blue'>Before selecting, please confirm that the Availability Zone supports the specification of creating REDIS、SLB ans ECS resources</font></b>
      zh-cn: 选择可用区ID。<br><b>注： <font color='blue'>选择可用区前请确认该可用区是否支持创建REDIS、SLB及ECS资源的规格</font></b>
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
  VSwitchCidrBlock1:
    Type: String
    Label:
      en: VSwitch 1 CIDR Block
      zh-cn: 交换机1网段
    Description:
      en: Must be a sub-network segment of the proprietary network and is not occupied by other v-switches.
      zh-cn: 必须是所属专有网络的子网段，并且没有被其他交换机占用。
    Default: 192.168.3.0/24
  VSwitchZoneId2:
    Type: String
    Label:
      en: VSwitch 2 Available Zone
      zh-cn: 交换机2可用区
    Description:
      en: Availability Zone ID, Please select a different availability zone, <br><b>note： <font color='blue'>Due to the low Availability Zone of PolarDB, <br>Before selecting, please confirm that the Availability Zone supports the specification of creating POLARDB and ECS resources.</font></b>
      zh-cn: 选择可用区ID，请选择不同的可用区，<br><b>注：<font color='blue'>由于PolarDB可用区较少， <br>选择可用区前请确认该可用区是否支持创建POLARDB及ECS资源的规格</font></b>
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
  VSwitchCidrBlock2:
    Type: String
    Label:
      en: VSwitch 2 CIDR Block
      zh-cn: 交换机2网段
    Description:
      en: Must be a sub-network segment of the proprietary network and is not occupied by other v-switches.
      zh-cn: 必须是所属专有网络的子网段，并且没有被其他交换机占用。
    Default: 192.168.4.0/24
  EcsInstanceChargeType:
    Type: String
    Label:
      en: Payment Type
      zh-cn: 付费类型
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[Postpaid：<font color=''green''>pay-as-you-go</font>]<br>[Prepaid：<font color=''green''>prepayment，monthly or annual</font>]'
      zh-cn: '<font color=''blue''><b>付费类型；可选值: </b></font><br>[Postpaid：<font color=''green''>按量付费</font>]<br>[Prepaid：<font color=''green''>预付费，包月</font>]<br>注：预付费，包月实例'
    Default: PostPaid
    AllowedValues:
      - PostPaid
      - PrePaid
  EcsInstanceAutoRenew:
    Type: Boolean
    Label:
      en: 'Automatic Renewal '
      zh-cn: 自动续费
    Description:
      en: Will the server be renewed automatically when it expires? The default is 1 month.
      zh-cn: 服务器到期是否自动续费, 默认续费1个月份。
    Default: false
  EcsInstanceType:
    Type: String
    Label:
      en: Instance Type
      zh-cn: 实例规格
    Description:
      en: 'Fill in the specifications that can be used under the VSwitch 1 availability zone;</b></font><br>general specifications：<font color=''red''><b>ecs.g5.large</b></font><br>note: a few zones do not support general specifications<br>see detail: <a href=''https://www.alibabacloud.com/help/en/doc-detail/25378.html'' target=''_blank''><b><font color=''blue''>Instance Specification Family</font></a></b>'
      zh-cn: 填写VSwitch1可用区下可使用的规格；<br>通用规格：<font color='red'><b>ecs.g5.large</b></font><br>注：可用区可能不支持通用规格<br>规格详见：<a href='https://help.aliyun.com/document_detail/25378.html' target='_blank'><b><font color='blue'>实例规格族</font></a></b>
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
  EcsInstanceDiskCategory:
    Type: String
    Label:
      en: System Disk Type
      zh-cn: 系统盘类型
    Description:
      en: '<font color=''blue''><b>Optional values:</b></font><br>[cloud_efficiency: <font color=''green''>Efficient Cloud Disk</font>]<br>[cloud_ssd: <font color=''green''>SSD Cloud Disk</font>]<br>[cloud_essd: <font color=''green''>ESSD Cloud Disk</font>]<br>[cloud: <font color=''green''>Cloud Disk</font>]<br>[ephemeral_ssd: <font color=''green''>Local SSD Cloud Disk</font>]'
      zh-cn: '<font color=''blue''><b>可选值：</b></font><br>[cloud_efficiency: <font color=''green''>高效云盘</font>]<br>[cloud_ssd: <font color=''green''>SSD云盘</font>]<br>[cloud_essd: <font color=''green''>ESSD云盘</font>]<br>[cloud: <font color=''green''>普通云盘</font>]<br>[ephemeral_ssd: <font color=''green''>本地SSD盘</font>]'
    Default: cloud_efficiency
    AllowedValues:
      - cloud_efficiency
      - cloud_ssd
      - cloud
      - cloud_essd
      - ephemeral_ssd
  EcsInstanceSystemDiskSize:
    Type: Number
    Label:
      en: System Disk Space
      zh-cn: 系统盘空间
    Description:
      en: 'System disk size, range of values: 40-500, units: GB.'
      zh-cn: 系统盘大小, 取值范围：[40, 500], 单位：GB。
    Default: 40
    MinValue: 40
    MaxValue: 500
  EcsInstancePassword:
    Type: String
    Label:
      en: Instance Password
      zh-cn: 登录密码
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=| {}[]:;' <>,.? / Special symbol in).
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    AssociationProperty: ALIYUN::ECS::Instance::Password
  LoadbalancerPayType:
    Type: String
    Label:
      en: Payment Type
      zh-cn: 付费类型
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[PayOnDemand：<font color=''green''>pay-as-you-go</font>]<br>[PrePay：<font color=''green''>prepayment，monthly or annual</font>]'
      zh-cn: '<font color=''blue''><b>付费类型；可选值: </b></font><br>[PayOnDemand：<font color=''green''>按量付费</font>]<br>[PrePay：<font color=''green''>预付费，包月</font>]'
    Default: PayOnDemand
    AllowedValues:
      - PayOnDemand
      - PrePay
  LoadBalancerSpec:
    Type: String
    Label:
      en: Specifications
      zh-cn: 规格
    Description:
      en: Instance specifications, see detail：</b><a href='https://www.alibabacloud.com/help/doc-detail/85939.html' target='_blank'><b><font color='blue'>Performance support type</b></font></a>
      zh-cn: 实例规格，详见：</b><a href='https://help.aliyun.com/document_detail/85939.html' target='_blank'><b><font color='blue'>性能保障型</b></font></a>
    Default: slb.s2.medium
    AllowedValues:
      - slb.s1.small
      - slb.s2.small
      - slb.s2.medium
      - slb.s3.small
      - slb.s3.medium
      - slb.s3.large
  RedisInstanceChargeType:
    Type: String
    Label:
      en: Payment Type
      zh-cn: 付费类型
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[PostPaid：<font color=''green''>pay-as-you-go</font>]'
      zh-cn: '<font color=''blue''><b>付费类型；可选值: </b></font><br>[PostPaid：<font color=''green''>按量付费</font>]'
    Default: PostPaid
    AllowedValues:
      - PostPaid
  RedisInstanceClass:
    Type: String
    Label:
      en: Specifications
      zh-cn: 规格
    Description:
      en: 'Select the instance specification based on the type of database engine and the available area support;<br>see detail: <a href=''https://www.alibabacloud.com/help/doc-detail/26350.html'' target=''_blank''><b><font color=''blue''>Instance specification sheet</font></b></a>'
      zh-cn: 根据数据库引擎的类型和可用的区域支持选择实例规格；<br>请参见详细信息：<a href='https://help.aliyun.com/document_detail/26350.html' target='_blank'><b><font color='blue'>实例规格表</font></b></a>
    Default: redis.master.mid.default
  RedisEngineVersion:
    Type: String
    Label:
      en: Database Version
      zh-cn: 数据库版本
    Description:
      en: 'Redis database version,Default: 4.0.'
      zh-cn: Redis数据库版本，默认值：4.0。
    Default: '4.0'
    AllowedValues:
      - '2.8'
      - '4.0'
      - '5.0'
  RedisInstancePassword:
    Type: String
    Label:
      en: Database Password
      zh-cn: 数据库密码
    Description:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    MinLength: '8'
    MaxLength: '30'
    NoEcho: true
  DBClusterPayType:
    Type: String
    Label:
      en: Payment Type
      zh-cn: 付费类型
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[PostPaid：<font color=''green''>pay-as-you-go</font>]<br>[PrePaid：<font color=''green''>prepayment，monthly or annual</font>]<br><b>note: <font color=''blue''>Prepaid，The monthly instance does not create a database (db) and an account</font>'
      zh-cn: '<font color=''blue''><b>付费类型；可选值: </b></font><br>[PostPaid：<font color=''green''>按量付费</font>]<br>[PrePaid：<font color=''green''>预付费，包月</font>]<br>注： <font color=''blue''>预付费，包月实例不创建数据库（db）和账号</font>'
    Default: PostPaid
    AllowedValues:
      - PostPaid
      - PrePaid
  DBClusterRenewalStatus:
    Type: String
    Label:
      en: 'Automatic Renewal '
      zh-cn: 自动续费
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[AutoRenewal：<font color=''green''>automatic renewal</font>]<br>[NotRenewal：<font color=''green''>No longer a renewal</font>]<br><b>note： <font color=''blue''>If the automatic renewal, the default renewal 1 month</font>'
      zh-cn: '<font color=''blue''><b>可选值: </b></font><br>[AutoRenewal：<font color=''green''>自动续费</font>]<br>[NotRenewal：<font color=''green''>不再续费</font>]<br>注： 如自动续费，默认续费1个月份。'
    Default: NotRenewal
    AllowedValues:
      - AutoRenewal
      - NotRenewal
  DBClusterTypeAndVersion:
    Type: String
    Label:
      en: Type And Version
      zh-cn: 类型与版本号
    Description:
      en: Database type and version number.
      zh-cn: 数据库类型与版本号。
    Default: MySQL-5.6
    AllowedValues:
      - MySQL-5.6
      - MySQL-8.0
      - Oracle-11
      - PostgreSQL-11
  DBNodeClass:
    Type: String
    Label:
      en: Node Specifications
      zh-cn: 规格
    Description:
      en: See detail：<b><a href='https://www.alibabacloud.com/help/doc-detail/68498.html' target='_blank'><font color='blue'>Specifications and pricing</font></a></b>
      zh-cn: 详见：<b><a href='https://help.aliyun.com/document_detail/68498.html' target='_blank'><font color='blue'>规格与定价</font></a></b>
    Default: polar.mysql.x4.medium
  DBName:
    Type: String
    Label:
      en: Database Name
      zh-cn: 数据库名称
    Description:
      en: The database name created by the instance, consisting of lowercase letters, numbers, underscores, and middle lines, beginning with letters, ending with letters or numbers, up to 64 characters.
      zh-cn: 实例创建的数据库名称，由小写字母、数字、下划线、中划线组成，以字母开头，字母或数字结尾，最多64个字符。
    Default: polardb_test
  PolarAccountName:
    Type: String
    Label:
      en: Database Account
      zh-cn: 数据库账号
    Description:
      en: Maximum 16 characters,Consists of a lowercase letter, a number, an underscore, a letter beginning, a letter or a number ending.<br><b>note： <font color='blue'>Keywords cannot be used, e.g.:admin/root</font></b>
      zh-cn: 最长16个字符, 由小写字母，数字、下划线组成、字母开头，字母或数字结尾。<br><b>注： <font color='blue'>关键字不能用，如：admin/root</font></b>
    Default: polardb_admin
  DBAccountPassword:
    Type: String
    Label:
      en: Account password
      zh-cn: 数据库账号密码
    Description:
      en: Length 8-32 characters, can contain size letters, Numbers and special symbols (including:!@#$%^&*-+=_).
      zh-cn: 长度8-32个字符,可包含大小字母、数字及特殊符号（包含：!@#$%^&*-+=_）。
    ConstraintDescription:
      en: Length 8-32, can contain size letters, Numbers and special symbols (including:!@#$%^&*-+=_).
      zh-cn: 长度8-32,可包含大小字母、数字及特殊符号（包含：!@#$%^&*-+=_）。
    MinLength: '8'
    MaxLength: '32'
    NoEcho: true
  ScalingGroupMinSize:
    Type: Number
    Label:
      en: Minimum Number of ECS
      zh-cn: ECS实例数量最小值
    Description:
      en: ' range of values: [1, 100]'
      zh-cn: 取值范围：[1, 100]
    Default: 1
    MinValue: 1
    MaxValue: 100
  ScalingGroupMaxSize:
    Type: Number
    Label:
      en: Maximum Number of ECS
      zh-cn: ECS实例数量最大值
    Description:
      en: ' range of values: [0, 100]'
      zh-cn: 取值范围：[0, 100]
    Default: 8
    MinValue: 1
    MaxValue: 100
  ScalingGroupRemovalPolicys:
    Type: CommaDelimitedList
    Label:
      en: Removal ECS Policies
      zh-cn: 移出ECS实例的策略
    Description:
      en: '<font color=''blue''><b>Optional values: </b></font><br>[OldestInstance：<font color=''green''>Take the earliest ECS instance to join the flex group</font>]<br>[NewestInstance：<font color=''green''>Take the latest ECS instance that has joined the flex group</font>]<br>[OldestScalingConfiguration：<font color=''green''>Take the instance that was created by the earliest scaling configuration</font>]<br><font color=''blue''></a>'
      zh-cn: '<font color=''blue''><b>可选值: </b></font><br>[OldestInstance：<font color=''green''>取最早加入伸缩组的 ECS 实例</font>]<br>[NewestInstance：<font color=''green''>取最新加入伸缩组的 ECS 实例</font>]<br>[OldestScalingConfiguration：<font color=''green''>取最早伸缩配置创建的实例</font>]<br><font color=''blue''></a>'
    Default: NewestInstance
    AllowedValues:
      - OldestScalingConfiguration
      - OldestInstance
      - NewestInstance
  ScalingRuleAdjustmentType:
    Type: String
    Label:
      en: Scale Rule Adjustment Mode
      zh-cn: 伸缩规则调整方式
    Description:
      en: <font color='blue'><b>Optional values:</b></font><br>[QuantityChangeInCapacity：<font color='green'>Increases or decreases a specified number of ECS instances(-500~500)</font>]<br>[PercentChangeInCapacity：<font color='green'>Increases or decreases ECS instances by a specified percentage(-100~10000)</font>]<br>[TotalCapacity：<font color='green'>Adjusts the number of ECS instances of the current scaling group to the specified number(0~1000)</font>]<br><font color='blue'></a>
      zh-cn: '<font color=''blue''><b>可选值: </b></font><br>[QuantityChangeInCapacity：<font color=''green''>增加或减少指定数量的ECS实例(-500~500)</font>]<br>[PercentChangeInCapacity：<font color=''green''>增加或减少指定比例的ECS实例(-100~10000)</font>]<br>[TotalCapacity：<font color=''green''>将当前伸缩组的ECS实例数量调整到指定数量(0~1000)</font>]<br><font color=''blue''></a>'
    Default: TotalCapacity
    AllowedValues:
      - QuantityChangeInCapacity
      - PercentChangeInCapacity
      - TotalCapacity
  ScalingRuleAdjustmentValue:
    Type: Number
    Label:
      en: Scaling Rules Adjust Values
      zh-cn: 伸缩规则调整值
    Description:
      en: The number of ECS instances in the scaling group should not exceed 500 in any case.
      zh-cn: 伸缩组内的ECS实例数量，任何情况下，单次调整的ECS实例台数都不能超过500。
    Default: 2
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - VpcCidrBlock
          - VSwitchZoneId1
          - VSwitchCidrBlock1
          - VSwitchZoneId2
          - VSwitchCidrBlock2
        Label:
          default: VPC
      - Parameters:
          - EcsInstanceChargeType
          - EcsInstanceAutoRenew
          - EcsInstanceType
          - EcsInstanceDiskCategory
          - EcsInstanceSystemDiskSize
          - EcsInstancePassword
        Label:
          default: ECS
      - Parameters:
          - LoadbalancerPayType
          - LoadBalancerSpec
        Label:
          default: SLB
      - Parameters:
          - RedisInstanceChargeType
          - RedisInstanceClass
          - RedisEngineVersion
          - RedisInstancePassword
        Label:
          default: REDIS
      - Parameters:
          - DBClusterPayType
          - DBClusterRenewalStatus
          - DBClusterTypeAndVersion
          - DBNodeClass
          - DBName
          - PolarAccountName
          - DBAccountPassword
        Label:
          default: POLARDB
      - Parameters:
          - ScalingGroupMinSize
          - ScalingGroupMaxSize
          - ScalingGroupRemovalPolicys
          - ScalingRuleAdjustmentType
          - ScalingRuleAdjustmentValue
        Label:
          default: ESS
    TemplateTags:
      - acs:solution:云市场:通用产品上云部署架构（高可用、弹性）
Workspace:
  local.tf: |+
    locals {
      is_polardbinstance = "PostPaid" == var.DBClusterPayType
    }

    locals {
      is_prepay_redis = "PrePaid" == var.RedisInstanceChargeType
    }

    locals {
      is_redis = "PostPaid" == var.RedisInstanceChargeType
    }

  main.tf: |+
    data "alicloud_images" "image_id" {
      name_regex = "^centos_7_9_x64*"
      owners      = "system"  # 官方镜像
      most_recent = true      # 获取最新版本
    }
    resource "alicloud_vpc" "ecs_vpc" {
      cidr_block = var.VpcCidrBlock
    }

    resource "alicloud_security_group" "ecs_security_group" {
      vpc_id = alicloud_vpc.ecs_vpc.id
      tags = {
        cloud_market = "003"
      }
    }

    resource "alicloud_vswitch" "ecsvswitch1" {
      zone_id    = var.VSwitchZoneId1
      vpc_id     = alicloud_vpc.ecs_vpc.id
      cidr_block = var.VSwitchCidrBlock1
    }

    resource "alicloud_instance" "ecs_instance" {
      vpc_id               = alicloud_vpc.ecs_vpc.id
      vswitch_id           = alicloud_vswitch.ecsvswitch1.id
      security_groups      = [alicloud_security_group.ecs_security_group.id]
      image_id             = data.alicloud_images.image_id.images[0].id
      auto_renew_period    = 1
      instance_charge_type = var.EcsInstanceChargeType
      instance_type        = var.EcsInstanceType
      password             = var.EcsInstancePassword
      period               = 1
      period_unit          = "Month"
      system_disk_category = var.EcsInstanceDiskCategory
      system_disk_size     = var.EcsInstanceSystemDiskSize
      tags = {
        cloud_market = "003"
      }
    }

    resource "alicloud_image" "ecs_custom_image" {
      instance_id = alicloud_instance.ecs_instance.id
    }

    resource "alicloud_vswitch" "ecsvswitch2" {
      zone_id    = var.VSwitchZoneId2
      vpc_id     = alicloud_vpc.ecs_vpc.id
      cidr_block = var.VSwitchCidrBlock2
    }

    resource "alicloud_slb_load_balancer" "slb_load_balancer" {
      address_type         = "internet"
      internet_charge_type = "paybybandwidth"
      load_balancer_spec = var.LoadBalancerSpec
      master_zone_id     = var.VSwitchZoneId1
    }

    resource "alicloud_slb_listener" "slb_listener" {
      backend_port     = 80
      bandwidth        = 1
      frontend_port    = 80
      load_balancer_id = alicloud_slb_load_balancer.slb_load_balancer.id
      protocol         = "http"
      scheduler        = "wrr"
      depends_on = [
        alicloud_slb_load_balancer.slb_load_balancer
      ]
    }

    resource "alicloud_ess_scaling_group" "ess_scaling_group" {
      default_cooldown = 300
      loadbalancer_ids = [alicloud_slb_load_balancer.slb_load_balancer.id]
      max_size         = var.ScalingGroupMaxSize
      min_size         = var.ScalingGroupMinSize
      multi_az_policy  = "BALANCE"
      removal_policies = var.ScalingGroupRemovalPolicys
      vswitch_ids = [
        alicloud_vswitch.ecsvswitch1.id,
        alicloud_vswitch.ecsvswitch2.id
      ]
      depends_on = [
        alicloud_slb_listener.slb_listener
      ]
    }

    resource "alicloud_ess_scaling_configuration" "ess_scaling_configuration" {
      security_group_id          = alicloud_security_group.ecs_security_group.id
      image_id                   = alicloud_image.ecs_custom_image.id
      instance_type              = var.EcsInstanceType
      internet_max_bandwidth_in  = 1
      internet_max_bandwidth_out = 20
      password_inherit           = true
      scaling_group_id     = alicloud_ess_scaling_group.ess_scaling_group.id
      system_disk_category = var.EcsInstanceDiskCategory
      system_disk_size     = var.EcsInstanceSystemDiskSize
      tags = {
        Key   = "cloud_market"
        Value = "003"
      }
    }

    resource "alicloud_ess_scaling_rule" "ess_scaling_rule" {
      adjustment_type  = var.ScalingRuleAdjustmentType
      adjustment_value = var.ScalingRuleAdjustmentValue
      scaling_group_id = alicloud_ess_scaling_group.ess_scaling_group.id
    }

    resource "alicloud_ess_attachment" "default" {
      scaling_group_id = alicloud_ess_scaling_group.ess_scaling_group.id
      instance_ids     = [alicloud_instance.ecs_instance.id]
      force            = true
    }

    resource "alicloud_polardb_cluster" "polardbcluster" {
      zone_id           = var.VSwitchZoneId2
      vpc_id            = alicloud_vpc.ecs_vpc.id
      vswitch_id        = alicloud_vswitch.ecsvswitch2.id
      auto_renew_period = 1
      db_node_class  = var.DBNodeClass
      db_type        = split("-", var.DBClusterTypeAndVersion)[0]
      db_version     = split("-", var.DBClusterTypeAndVersion)[1]
      pay_type       = var.DBClusterPayType
      period         = 1
      renewal_status = var.DBClusterRenewalStatus
      db_cluster_ip_array {
        db_cluster_ip_array_name = "default"
        security_ips             = [var.VpcCidrBlock]
      }
    }

    resource "alicloud_polardb_database" "polardbinstance" {
      character_set_name = "utf8"
      db_cluster_id      = alicloud_polardb_cluster.polardbcluster.id
      db_name            = var.DBName
      depends_on = [
        alicloud_polardb_cluster.polardbcluster
      ]
    }

    resource "alicloud_polardb_account" "polardbaccount" {
      account_name     = var.PolarAccountName
      account_password = var.DBAccountPassword
      account_type     = "Normal"
      db_cluster_id    = alicloud_polardb_cluster.polardbcluster.id
      depends_on = [
        alicloud_polardb_database.polardbinstance
      ]
    }

    resource "alicloud_polardb_account_privilege" "polardbaccount_privilege" {
      account_name      = var.PolarAccountName
      account_privilege = "ReadWrite"
      db_cluster_id     = alicloud_polardb_cluster.polardbcluster.id
      db_names          = [var.DBName]
      depends_on = [
        alicloud_polardb_account.polardbaccount,
        alicloud_polardb_cluster.polardbcluster,
        alicloud_polardb_database.polardbinstance
      ]
    }

    resource "alicloud_kvstore_instance" "redis_instance" {
      count             = local.is_redis ? 1 : 0
      availability_zone = var.VSwitchZoneId1
      vswitch_id        = alicloud_vswitch.ecsvswitch1.id
      engine_version    = var.RedisEngineVersion
      instance_class    = var.RedisInstanceClass
      password = var.RedisInstancePassword
      payment_type = "PostPaid"
    }

    resource "alicloud_kvstore_instance" "prepay_redis_instance" {
      count             = local.is_prepay_redis ? 1 : 0
      availability_zone = var.VSwitchZoneId1
      vswitch_id        = alicloud_vswitch.ecsvswitch1.id
      engine_version    = var.RedisEngineVersion
      instance_class    = var.RedisInstanceClass
      password = var.RedisInstancePassword
      payment_type = "PrePaid"
      period       = 1
    }

    resource "alicloud_slb_attachment" "slb_backend_server_attachment" {
      instance_ids     = [alicloud_instance.ecs_instance.id]
      weight           = 100
      load_balancer_id = alicloud_slb_load_balancer.slb_load_balancer.id
    }

    resource "alicloud_security_group_rule" "ecs_security_group_security_group_egress_0_e58f674e" {
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "all"
      nic_type          = "intranet"
      port_range        = "-1/-1"
      priority          = 1
      security_group_id = alicloud_security_group.ecs_security_group.id
      type              = "egress"
    }

    resource "alicloud_security_group_rule" "ecs_security_group_security_group_egress_1_18954014" {
      cidr_ip           = "0.0.0.0/0"
      ip_protocol       = "all"
      nic_type          = "intranet"
      port_range        = "-1/-1"
      priority          = 1
      security_group_id = alicloud_security_group.ecs_security_group.id
      type              = "egress"
    }

    resource "alicloud_security_group_rule" "ecs_security_group_security_group_ingress_0_6069273f" {
      ip_protocol       = "all"
      nic_type          = "intranet"
      port_range        = "-1/-1"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      security_group_id = alicloud_security_group.ecs_security_group.id
      type              = "ingress"
    }

    resource "alicloud_security_group_rule" "ecs_security_group_security_group_ingress_1_a314b400" {
      ip_protocol       = "all"
      nic_type          = "intranet"
      port_range        = "-1/-1"
      priority          = 1
      cidr_ip           = "0.0.0.0/0"
      security_group_id = alicloud_security_group.ecs_security_group.id
      type              = "ingress"
    }

  output.tf: |+
    output "custom_image" {
      value       = alicloud_image.ecs_custom_image.id
      description = <<EOT
      {
        "en": "Custom Image ID",
        "zh-cn": "自定义镜像ID"
      }
      EOT
    }

    output "ecs_instance_id" {
      value       = alicloud_instance.ecs_instance.id
      description = <<EOT
      {
        "en": "Ecs instance ID",
        "zh-cn": "Ecs实例ID"
      }
      EOT
    }

    output "load_balancer_id" {
      value       = alicloud_slb_load_balancer.slb_load_balancer.id
      description = <<EOT
      {
        "en": "SLB ID",
        "zh-cn": "负载均衡实例ID"
      }
      EOT
    }

    output "redis_host" {
      value       = length(alicloud_kvstore_instance.redis_instance[*].connection_domain) > 0 ? alicloud_kvstore_instance.redis_instance[*].connection_domain : null
      description = <<EOT
      {
        "en": "The Intranet connection address of the Redis instance",
        "zh-cn": "Redis实例的内网连接地址"
      }
      EOT
    }

    output "scaling_group_id" {
      value       = alicloud_ess_scaling_group.ess_scaling_group.id
      description = <<EOT
      {
        "en": "Scaling Group ID",
        "zh-cn": "弹性伸缩组ID"
      }
      EOT
    }

  variable.tf: |+
    variable "VpcCidrBlock" {
      type        = string
      default     = "192.168.0.0/16"
      description = <<EOT
      {
        "Label": {
          "en": "VPC CIDR Block",
          "zh-cn": "专有网络网段"
        },
        "Description": {
          "en": "The IP address range of the VPC in the CIDR Block form; <br>You can use the following IP address ranges: <br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>",
          "zh-cn": "专有网络IP地址段范围，<br>您可以使用以下的IP地址段:<br><font color='green'>[10.0.0.0/8]</font><br><font color='green'>[172.16.0.0/12]</font><br><font color='green'>[192.168.0.0/16]</font>"
        },
        "AllowedValues": [
          "192.168.0.0/16",
          "172.16.0.0/12",
          "10.0.0.0/8"
        ]
      }
      EOT
    }

    variable "VSwitchZoneId1" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch 1 Available Zone",
          "zh-cn": "交换机1可用区"
        },
        "Description": {
          "en": "Availability Zone ID,<br><b>note： <font color='blue'>Before selecting, please confirm that the Availability Zone supports the specification of creating REDIS、SLB ans ECS resources</font></b>",
          "zh-cn": "选择可用区ID。<br><b>注： <font color='blue'>选择可用区前请确认该可用区是否支持创建REDIS、SLB及ECS资源的规格</font></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId"
      }
      EOT
    }

    variable "VSwitchCidrBlock1" {
      type        = string
      default     = "192.168.3.0/24"
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch 1 CIDR Block",
          "zh-cn": "交换机1网段"
        },
        "Description": {
          "en": "Must be a sub-network segment of the proprietary network and is not occupied by other v-switches.",
          "zh-cn": "必须是所属专有网络的子网段，并且没有被其他交换机占用。"
        }
      }
      EOT
    }

    variable "VSwitchZoneId2" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch 2 Available Zone",
          "zh-cn": "交换机2可用区"
        },
        "Description": {
          "en": "Availability Zone ID, Please select a different availability zone, <br><b>note： <font color='blue'>Due to the low Availability Zone of PolarDB, <br>Before selecting, please confirm that the Availability Zone supports the specification of creating POLARDB and ECS resources.</font></b>",
          "zh-cn": "选择可用区ID，请选择不同的可用区，<br><b>注：<font color='blue'>由于PolarDB可用区较少， <br>选择可用区前请确认该可用区是否支持创建POLARDB及ECS资源的规格</font></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId"
      }
      EOT
    }

    variable "VSwitchCidrBlock2" {
      type        = string
      default     = "192.168.4.0/24"
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch 2 CIDR Block",
          "zh-cn": "交换机2网段"
        },
        "Description": {
          "en": "Must be a sub-network segment of the proprietary network and is not occupied by other v-switches.",
          "zh-cn": "必须是所属专有网络的子网段，并且没有被其他交换机占用。"
        }
      }
      EOT
    }

    variable "EcsInstanceChargeType" {
      type        = string
      default     = "PostPaid"
      description = <<EOT
      {
        "Label": {
          "en": "Payment Type",
          "zh-cn": "付费类型"
        },
        "Description": {
          "en": "<font color='blue'><b>Optional values: </b></font><br>[Postpaid：<font color='green'>pay-as-you-go</font>]<br>[Prepaid：<font color='green'>prepayment，monthly or annual</font>]",
          "zh-cn": "<font color='blue'><b>付费类型；可选值: </b></font><br>[Postpaid：<font color='green'>按量付费</font>]<br>[Prepaid：<font color='green'>预付费，包月</font>]<br>注：预付费，包月实例"
        },
        "AllowedValues": [
          "PostPaid",
          "PrePaid"
        ]
      }
      EOT
    }

    variable "EcsInstanceAutoRenew" {
      type        = bool
      description = <<EOT
      {
        "Label": {
          "en": "Automatic Renewal ",
          "zh-cn": "自动续费"
        },
        "Description": {
          "en": "Will the server be renewed automatically when it expires? The default is 1 month.",
          "zh-cn": "服务器到期是否自动续费, 默认续费1个月份。"
        }
      }
      EOT
    }

    variable "EcsInstanceType" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Instance Type",
          "zh-cn": "实例规格"
        },
        "Description": {
          "en": "Fill in the specifications that can be used under the VSwitch 1 availability zone;</b></font><br>general specifications：<font color='red'><b>ecs.g5.large</b></font><br>note: a few zones do not support general specifications<br>see detail: <a href='https://www.alibabacloud.com/help/en/doc-detail/25378.html' target='_blank'><b><font color='blue'>Instance Specification Family</font></a></b>",
          "zh-cn": "填写VSwitch1可用区下可使用的规格；<br>通用规格：<font color='red'><b>ecs.g5.large</b></font><br>注：可用区可能不支持通用规格<br>规格详见：<a href='https://help.aliyun.com/document_detail/25378.html' target='_blank'><b><font color='blue'>实例规格族</font></a></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::InstanceType"
      }
      EOT
    }

    variable "EcsInstanceDiskCategory" {
      type        = string
      default     = "cloud_efficiency"
      description = <<EOT
      {
        "Label": {
          "en": "System Disk Type",
          "zh-cn": "系统盘类型"
        },
        "Description": {
          "en": "<font color='blue'><b>Optional values:</b></font><br>[cloud_efficiency: <font color='green'>Efficient Cloud Disk</font>]<br>[cloud_ssd: <font color='green'>SSD Cloud Disk</font>]<br>[cloud_essd: <font color='green'>ESSD Cloud Disk</font>]<br>[cloud: <font color='green'>Cloud Disk</font>]<br>[ephemeral_ssd: <font color='green'>Local SSD Cloud Disk</font>]",
          "zh-cn": "<font color='blue'><b>可选值：</b></font><br>[cloud_efficiency: <font color='green'>高效云盘</font>]<br>[cloud_ssd: <font color='green'>SSD云盘</font>]<br>[cloud_essd: <font color='green'>ESSD云盘</font>]<br>[cloud: <font color='green'>普通云盘</font>]<br>[ephemeral_ssd: <font color='green'>本地SSD盘</font>]"
        },
        "AllowedValues": [
          "cloud_efficiency",
          "cloud_ssd",
          "cloud",
          "cloud_essd",
          "ephemeral_ssd"
        ]
      }
      EOT
    }

    variable "EcsInstanceSystemDiskSize" {
      type        = number
      default     = 40
      description = <<EOT
      {
        "Label": {
          "en": "System Disk Space",
          "zh-cn": "系统盘空间"
        },
        "Description": {
          "en": "System disk size, range of values: 40-500, units: GB.",
          "zh-cn": "系统盘大小, 取值范围：[40, 500], 单位：GB。"
        },
        "MinValue": 40,
        "MaxValue": 500
      }
      EOT
    }

    variable "EcsInstancePassword" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Instance Password",
          "zh-cn": "登录密码"
        },
        "Description": {
          "en": "Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).",
          "zh-cn": "服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
        },
        "ConstraintDescription": {
          "en": "Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=| {}[]:;' <>,.? / Special symbol in).",
          "zh-cn": "长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::Password"
      }
      EOT
    }

    variable "LoadbalancerPayType" {
      type        = string
      default     = "PayOnDemand"
      description = <<EOT
      {
        "Label": {
          "en": "Payment Type",
          "zh-cn": "付费类型"
        },
        "Description": {
          "en": "<font color='blue'><b>Optional values: </b></font><br>[PayOnDemand：<font color='green'>pay-as-you-go</font>]<br>[PrePay：<font color='green'>prepayment，monthly or annual</font>]",
          "zh-cn": "<font color='blue'><b>付费类型；可选值: </b></font><br>[PayOnDemand：<font color='green'>按量付费</font>]<br>[PrePay：<font color='green'>预付费，包月</font>]"
        },
        "AllowedValues": [
          "PayOnDemand",
          "PrePay"
        ]
      }
      EOT
    }

    variable "LoadBalancerSpec" {
      type        = string
      default     = "slb.s2.medium"
      description = <<EOT
      {
        "Label": {
          "en": "Specifications",
          "zh-cn": "规格"
        },
        "Description": {
          "en": "Instance specifications, see detail：</b><a href='https://www.alibabacloud.com/help/doc-detail/85939.html' target='_blank'><b><font color='blue'>Performance support type</b></font></a>",
