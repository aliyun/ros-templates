ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  VpcId:
    Type: String
    Label:
      en: Existing VPC Instance ID
      zh-cn: 现有VPC的实例ID
    Description:
      en: Please search the ID starting with (vpc-xxx)from console-Virtual Private
        Cloud
      zh-cn: 控制台-VPC-专有网络下查询
    AssociationProperty: ALIYUN::ECS::VPC::VPCId
  VSwitchZoneId:
    Type: String
    Label:
      en: VSwitch Zone ID
      zh-cn: 交换机可用区
    Description:
      en: Availability ID for existing switches
      zh-cn: 现有交换机的可用区ID
    AssociationProperty: ALIYUN::ECS::Instance::ZoneId
  VSwitchId:
    Type: String
    Label:
      en: VSwitch ID
      zh-cn: 网络交换机ID
    Description:
      en: Please search the business VSwitch ID starting with(vsw-xxx)from console-Virtual
        Private Cloud-VSwitches
      zh-cn: 现有业务网络交换机的实例ID,控制台-VPC-专有网络-交换机下查询
    AssociationProperty: ALIYUN::ECS::VSwitch::VSwitchId
    AssociationPropertyMetadata:
      VpcId: VpcId
      ZoneId: VSwitchZoneId
  SecurityGroupId:
    Type: String
    Label:
      en: Business Security Group ID
      zh-cn: 业务安全组ID
    Description:
      en: Please search the business security group ID starting with(sg-xxx)from console-ECS-Network
        & Security
      zh-cn: 现有业务安全组的实例ID,控制台-ECS-网络与安全-安全组下查询
    AssociationProperty: ALIYUN::ECS::SecurityGroup::SecurityGroupId
    AssociationPropertyMetadata:
      VpcId: VpcId
  InstanceType:
    Type: String
    Label:
      en: Instance Type
      zh-cn: 实例规格
    Description:
      en: <font color='blue'><b>1.Before selecting the model please confirm that the
        current available zone under the model is in stock, some models need to be
        reported in advance</b></font>]<br><font color='blue'><b>2.List of optional
        models</font>]<br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB
        Intranet bandwidth1Gbps In-grid sending and receiving packages30MillionPPSS</font>]<br></b>[ecs.c5.xlarge
        <font color='green'>4vCPU 8GiB Intranet bandwidth1.5Gbps In-grid sending and
        receiving packages50MillionPPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU
        16GiB Intranet bandwidth2.5Gbps In-grid sending and receiving packages80MillionPPS</font>]
      zh-cn: <font color='blue'><b>1.选择机型前请先确认当前可用区下该机型是否有货，部分机型需要提前报备</b></font><br><font
        color='blue'><b>2.可选机型列表</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU
        4GiB 内网带宽1Gbps 内网收发包30万PPS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU
        8GiB 内网带宽1.5Gbps 内网收发包50万PPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU
        16GiB 内网带宽2.5Gbps 内网收发包80万PPS</font>]
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      ZoneId: VSwitchZoneId
  InstanceImageId:
    Type: String
    Label:
      en: Image ID
      zh-cn: 镜像ID
    Description:
      en: Image ID，See detail：<b><a href='https://www.alibabacloud.com/help/doc-detail/112977.html'
        target='_blank'><font color='blue'>Find the mirror</font></a></b>
      zh-cn: 镜像ID, 详见：<b><a href='https://help.aliyun.com/document_detail/112977.html'
        target='_blank'><font color='blue'>查找镜像</font></a></b>
    AssociationProperty: ALIYUN::ECS::Image::ImageId
    AssociationPropertyMetadata:
      InstanceType: ${InstanceType}
      SupportedImageOwnerAlias:
        - system
        - self
        - others
    Default: centos_7_04_64_20G_alibase_201701015.vhd
  InstancePassword:
    Type: String
    NoEcho: true
    Label:
      en: Instance Password
      zh-cn: 实例密码
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters,
        lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol
        in)
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers,
        ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    AssociationProperty: ALIYUN::ECS::Instance::Password
  BindWidth:
    Type: Number
    Label:
      en: Public IP Bandwidth
      zh-cn: 公网IP带宽值
    Description:
      en: 'Public network IP bandwidth，unit: Mbps'
      zh-cn: 公网IP带宽值，单位：Mbps
    Default: 5
    MinValue: 1
    MaxValue: 100
  DiskCategory:
    Type: String
    Label:
      en: Disk Type
      zh-cn: 磁盘类型
    AssociationProperty: ALIYUN::ECS::Disk::SystemDiskCategory
    AssociationPropertyMetadata:
      InstanceType: InstanceType
      ZoneId: VSwitchZoneId
  DiskSize:
    Type: Number
    Label:
      en: System Disk Space
      zh-cn: 系统盘空间
    Description:
      en: 'The size of the instance system disk, in GiB. Value range: 20 to 500'
      zh-cn: 实例系统盘大小，单位为GiB，取值范围：20~500
    Default: 40
    MinValue: 20
    MaxValue: 500
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
    - Parameters:
      - VpcId
      - VSwitchZoneId
      - VSwitchId
      - SecurityGroupId
      Label:
        default:
          en: Infrastructure Configuration
          zh-cn: 基础资源配置（必填）
    - Parameters:
      - InstanceType
      - InstanceImageId
      - BindWidth
      - DiskCategory
      - DiskSize
      - InstancePassword
      Label:
        default:
          en: Jenkins Configuration
          zh-cn: Jenkins 配置（必填）
    TemplateTags:
    - acs:example:弹性计算:Jenkins单机版(已有VPC)
Workspace:
  main.tf: |+
    resource "alicloud_ecs_instance_set" "ecs_instance_group" {
      zone_id            = var.VSwitchZoneId
      vswitch_id         = var.VSwitchId
      security_group_ids = [var.SecurityGroupId]
      image_id           = var.InstanceImageId
      host_name = join("", [
        "Jenkins",
        "-[0,3]"
      ])
      instance_charge_type = "PostPaid"
      instance_name = join("", [
        "Jenkins",
        "-[0,3]"
      ])
      instance_type              = var.InstanceType
      internet_max_bandwidth_out = var.BindWidth
      amount                     = 1
      password                   = var.InstancePassword
      system_disk_category       = var.DiskCategory
      system_disk_size           = var.DiskSize
    }

    resource "alicloud_eip_address" "vpc_eip" {
      bandwidth            = var.BindWidth
      internet_charge_type = "PayByTraffic"
    }

    resource "alicloud_eip_association" "eip_association" {
      instance_id   = alicloud_ecs_instance_set.ecs_instance_group.instance_ids[0]
      allocation_id = alicloud_eip_address.vpc_eip.id
      depends_on = [
        alicloud_eip_address.vpc_eip
      ]
    }

  output.tf: |+
    output "ecs_instance_ids" {
      value = alicloud_ecs_instance_set.ecs_instance_group.instance_ids
    }

  variable.tf: |+
    variable "VpcId" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Existing VPC Instance ID",
          "zh-cn": "现有VPC的实例ID"
        },
        "Description": {
          "en": "Please search the ID starting with (vpc-xxx)from console-Virtual Private Cloud",
          "zh-cn": "控制台-VPC-专有网络下查询"
        },
        "AssociationProperty": "ALIYUN::ECS::VPC::VPCId"
      }
      EOT
    }

    variable "VSwitchZoneId" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch Zone ID",
          "zh-cn": "交换机可用区"
        },
        "Description": {
          "en": "Availability ID for existing switches",
          "zh-cn": "现有交换机的可用区ID"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::ZoneId"
      }
      EOT
    }

    variable "VSwitchId" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch ID",
          "zh-cn": "网络交换机ID"
        },
        "Description": {
          "en": "Please search the business VSwitch ID starting with(vsw-xxx)from console-Virtual Private Cloud-VSwitches",
          "zh-cn": "现有业务网络交换机的实例ID,控制台-VPC-专有网络-交换机下查询"
        },
        "AssociationProperty": "ALIYUN::ECS::VSwitch::VSwitchId",
        "AssociationPropertyMetadata": {
          "VpcId": "VpcId",
          "ZoneId": "VSwitchZoneId"
        }
      }
      EOT
    }

    variable "SecurityGroupId" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Business Security Group ID",
          "zh-cn": "业务安全组ID"
        },
        "Description": {
          "en": "Please search the business security group ID starting with(sg-xxx)from console-ECS-Network & Security",
          "zh-cn": "现有业务安全组的实例ID,控制台-ECS-网络与安全-安全组下查询"
        },
        "AssociationProperty": "ALIYUN::ECS::SecurityGroup::SecurityGroupId",
        "AssociationPropertyMetadata": {
          "VpcId": "VpcId"
        }
      }
      EOT
    }

    variable "InstanceType" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Instance Type",
          "zh-cn": "实例规格"
        },
        "Description": {
          "en": "<font color='blue'><b>1.Before selecting the model please confirm that the current available zone under the model is in stock, some models need to be reported in advance</b></font>]<br><font color='blue'><b>2.List of optional models</font>]<br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB Intranet bandwidth1Gbps In-grid sending and receiving packages30MillionPPSS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU 8GiB Intranet bandwidth1.5Gbps In-grid sending and receiving packages50MillionPPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU 16GiB Intranet bandwidth2.5Gbps In-grid sending and receiving packages80MillionPPS</font>]",
          "zh-cn": "<font color='blue'><b>1.选择机型前请先确认当前可用区下该机型是否有货，部分机型需要提前报备</b></font><br><font color='blue'><b>2.可选机型列表</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB 内网带宽1Gbps 内网收发包30万PPS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU 8GiB 内网带宽1.5Gbps 内网收发包50万PPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU 16GiB 内网带宽2.5Gbps 内网收发包80万PPS</font>]"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::InstanceType",
        "AssociationPropertyMetadata": {
          "ZoneId": "VSwitchZoneId"
        }
      }
      EOT
    }

    variable "InstanceImageId" {
      type        = string
      default     = "centos_7_04_64_20G_alibase_201701015.vhd"
      description = <<EOT
      {
        "Label": {
          "en": "Image ID",
          "zh-cn": "镜像ID"
        },
        "Description": {
          "en": "Image ID，See detail：<b><a href='https://www.alibabacloud.com/help/doc-detail/112977.html' target='_blank'><font color='blue'>Find the mirror</font></a></b>",
          "zh-cn": "镜像ID, 详见：<b><a href='https://help.aliyun.com/document_detail/112977.html' target='_blank'><font color='blue'>查找镜像</font></a></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Image::ImageId",
        "AssociationPropertyMetadata": {
          "InstanceType": "$${InstanceType}",
          "SupportedImageOwnerAlias": [
            "system",
            "self",
            "others"
          ]
        }
      }
      EOT
    }

    variable "InstancePassword" {
      type        = string
      sensitive   = true
      description = <<EOT
      {
        "Label": {
          "en": "Instance Password",
          "zh-cn": "实例密码"
        },
        "Description": {
          "en": "Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in)",
          "zh-cn": "服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）"
        },
        "ConstraintDescription": {
          "en": "Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).",
          "zh-cn": "长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::Password"
      }
      EOT
    }

    variable "BindWidth" {
      type        = number
      default     = 5
      description = <<EOT
      {
        "Label": {
          "en": "Public IP Bandwidth",
          "zh-cn": "公网IP带宽值"
        },
        "Description": {
          "en": "Public network IP bandwidth，unit: Mbps",
          "zh-cn": "公网IP带宽值，单位：Mbps"
        },
        "MinValue": 1,
        "MaxValue": 100
      }
      EOT
    }

    variable "DiskCategory" {
      type        = string
      description = <<EOT
      {
        "Label": {
          "en": "Disk Type",
          "zh-cn": "磁盘类型"
        },
        "AssociationProperty": "ALIYUN::ECS::Disk::SystemDiskCategory",
        "AssociationPropertyMetadata": {
          "InstanceType": "InstanceType",
          "ZoneId": "VSwitchZoneId"
        }
      }
      EOT
    }

    variable "DiskSize" {
      type        = number
      default     = 40
      description = <<EOT
      {
        "Label": {
          "en": "System Disk Space",
          "zh-cn": "系统盘空间"
        },
        "Description": {
          "en": "The size of the instance system disk, in GiB. Value range: 20 to 500",
          "zh-cn": "实例系统盘大小，单位为GiB，取值范围：20~500"
        },
        "MinValue": 20,
        "MaxValue": 500
      }
      EOT
    }

