ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  CloneMode:
    Type: String
    Label:
      en: Clone Mode
      zh-cn: 克隆模式
    AllowedValues:
      - CloneEcsDisk
      - CloneEcsInstance
  SourceEcsDiskId:
    Type: String
    Label:
      en: Source ECS Disk ID
      zh-cn: 源ECS磁盘ID
    Description:
      en: Create a new disk based on the source ECS disk
      zh-cn: 基于源ECS磁盘创建新磁盘
    AssociationProperty: ALIYUN::ECS::Disk::DiskId
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${CloneMode}
            - CloneEcsDisk
    Default: Null
  SourceEcsInstanceId:
    Type: String
    Label:
      en: Source ECS Instance ID
      zh-cn: 源ECS实例ID
    Description:
      en: Source ECS Instance
      zh-cn: 源ECS实例ID
    AssociationProperty: ALIYUN::ECS::Instance::InstanceId
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${CloneMode}
            - CloneEcsInstance
    Default: Null
  ZoneId:
    Type: String
    Label:
      en: Create an Availability Zone for the disk
      zh-cn: 新建磁盘的可用区
    AssociationProperty: ALIYUN::ECS::Instance::ZoneId
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${CloneMode}
            - CloneEcsDisk
    Default: Null
  NumberOfClonedEcs:
    Type: Number
    Label:
      en: Number of Cloned ECS
      zh-cn: 将克隆的节点数
    Description:
      en: The number of nodes will be cloned
      zh-cn: 将克隆的节点数
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${CloneMode}
            - CloneEcsInstance
    Default: 1
    MinValue: 1
    MaxValue: 100
  LoginPassword:
    Type: String
    Label:
      en: ECS Instance Password
      zh-cn: 实例密码
    Description:
      en: The 8-30 long login password of instance, consists of the uppercase, lowercase letter and number. <br> special characters include（）'~！@#$%^&*_-+=|{}[]:;'<>,.?/.
      zh-cn: 长度8-30，必须包含大写字母、小写字母、数字、特殊符号三个；<br>特殊字符包括：（）'~！@#$%^&*_-+=|{}[]:;'<>,.?/
    ConstraintDescription:
      en: 'Length 8-30, must contain upper case letters, lower case letters, Numbers, special symbols three; special characters include: ()`~!@#$%^&*_-+=|{}[]:;''<>,.?/'
      zh-cn: 长度8-30，必须包含大写字母、小写字母、数字、特殊符号三种；特殊字符包括：()`~!@#$%^&*_-+=|{}[]:;' <>,.?/
    AssociationPropertyMetadata:
      Visible:
        Condition:
          Fn::Equals:
            - ${CloneMode}
            - CloneEcsInstance
    Default: Null
    AllowedPattern: '[a-zA-Z0-9-\(\)\`\~\!@\#\$%\^&\*-+=\|\{\}\[\]\:\;\‘\,\.\?\/]*'
    MinLength: '8'
    MaxLength: '30'
    NoEcho: true
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - CloneMode
          - SourceEcsDiskId
          - SourceEcsInstanceId
          - ZoneId
          - NumberOfClonedEcs
          - LoginPassword
        Label:
          default: ECS
    TemplateTags:
      - acs:example:弹性计算:克隆一台ECS实例
Workspace:
  variable.tf: |-
    variable "CloneMode" {
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "Clone Mode",
          "zh-cn": "克隆模式"
        },
        "AllowedValues": [
          "CloneEcsDisk",
          "CloneEcsInstance"
        ]
      }
      EOT
    }
    
    variable "SourceEcsDiskId" {
      default = null
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "Source ECS Disk ID",
          "zh-cn": "源ECS磁盘ID"
        },
        "Description": {
          "en": "Create a new disk based on the source ECS disk",
          "zh-cn": "基于源ECS磁盘创建新磁盘"
        },
        "AssociationProperty": "ALIYUN::ECS::Disk::DiskId",
        "AssociationPropertyMetadata": {
          "Visible": {
            "Condition": {
              "Fn::Equals": [
                "CloneMode",
                "CloneEcsDisk"
              ]
            }
          }
        }
      }
      EOT
    }
    
    variable "SourceEcsInstanceId" {
      default = null
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "Source ECS Instance ID",
          "zh-cn": "源ECS实例ID"
        },
        "Description": {
          "en": "Source ECS Instance",
          "zh-cn": "源ECS实例ID"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::InstanceId",
        "AssociationPropertyMetadata": {
          "Visible": {
            "Condition": {
              "Fn::Equals": [
                "CloneMode",
                "CloneEcsInstance"
              ]
            }
          }
        }
      }
      EOT
    }
    
    variable "ZoneId" {
      default = null
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "Create an Availability Zone for the disk",
          "zh-cn": "新建磁盘的可用区"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::ZoneId",
        "AssociationPropertyMetadata": {
          "Visible": {
            "Condition": {
              "Fn::Equals": [
                "CloneMode",
                "CloneEcsDisk"
              ]
            }
          }
        }
      }
      EOT
    }
    
    variable "NumberOfClonedEcs" {
      default = 1
      type = number
      description = <<EOT
      {
        "Label": {
          "en": "Number of Cloned ECS",
          "zh-cn": "将克隆的节点数"
        },
        "Description": {
          "en": "The number of nodes will be cloned",
          "zh-cn": "将克隆的节点数"
        },
        "AssociationPropertyMetadata": {
          "Visible": {
            "Condition": {
              "Fn::Equals": [
                "CloneMode",
                "CloneEcsInstance"
              ]
            }
          }
        },
        "MinValue": 1,
        "MaxValue": 100
      }
      EOT
    }
    
    variable "LoginPassword" {
      default = null
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "ECS Instance Password",
          "zh-cn": "实例密码"
        },
        "Description": {
          "en": "The 8-30 long login password of instance, consists of the uppercase, lowercase letter and number. <br> special characters include（）'~！@#$%^&*_-+=|{}[]:;'<>,.?/.",
          "zh-cn": "长度8-30，必须包含大写字母、小写字母、数字、特殊符号三个；<br>特殊字符包括：（）'~！@#$%^&*_-+=|{}[]:;'<>,.?/"
        },
        "ConstraintDescription": {
          "en": "Length 8-30, must contain upper case letters, lower case letters, Numbers, special symbols three; special characters include: ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/",
          "zh-cn": "长度8-30，必须包含大写字母、小写字母、数字、特殊符号三种；特殊字符包括：()`~!@#$%^&*_-+=|{}[]:;' <>,.?/"
        },
        "AssociationPropertyMetadata": {
          "Visible": {
            "Condition": {
              "Fn::Equals": [
                "CloneMode",
                "CloneEcsInstance"
              ]
            }
          }
        },
        "AllowedPattern": "[a-zA-Z0-9-\\(\\)\\`\\~\\!@\\#\\$%\\^&\\*-+=\\|\\{\\}\\[\\]\\:\\;\\‘\\,\\.\\?\\/]*",
        "MinLength": "8",
        "MaxLength": "30",
        "NoEcho": true
      }
      EOT
    }
  local.tf: |+
    locals {
      create_new_disk = var.CloneMode == "CloneEcsDisk"
    }

    locals {
      create_new_ecs_instance = var.CloneMode == "CloneEcsInstance"
    }
  main.tf: |+
    provider "alicloud" {
      // Provider configuration will be inherited from environment variables or provider block
    }
    data "alicloud_instances" "instances_ds" {
      count = local.create_new_ecs_instance ? 1 : 0
      ids   = local.create_new_ecs_instance ? [var.SourceEcsInstanceId] : []
    }

    data "alicloud_vswitches" "vsw_ds" {
      count = local.create_new_ecs_instance && length(data.alicloud_instances.instances_ds) > 0 ? 1 : 0
      ids   = length(data.alicloud_instances.instances_ds) > 0 ? [data.alicloud_instances.instances_ds[0].instances[0].vswitch_id] : []
    }
    
    data "alicloud_ecs_disks" "ecs_disk_ds" {
      count     = local.create_new_ecs_instance ? 1 : 0
      instance_id = local.create_new_ecs_instance ? var.SourceEcsInstanceId : null
    }

    resource "alicloud_ecs_snapshot" "disk_snapshot" {
      count   = local.create_new_disk ? 1 : 0
      disk_id = var.SourceEcsDiskId
    }

    resource "alicloud_ecs_disk" "clone_ecs_disk" {
      count             = local.create_new_disk ? 1 : 0
      availability_zone = var.ZoneId
      snapshot_id       = local.create_new_disk && length(alicloud_ecs_snapshot.disk_snapshot[*].id) > 0 ? alicloud_ecs_snapshot.disk_snapshot[0].id : null
    }

    resource "alicloud_ecs_instance_set" "ecs_instance_group" {
      count                    = local.create_new_ecs_instance ? 1 : 0
      zone_id                  = length(data.alicloud_vswitches.vsw_ds[*]) > 0 ? data.alicloud_vswitches.vsw_ds[0].vswitches[0].zone_id : null
      vswitch_id               = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].vswitch_id : null
      security_group_ids       = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].security_groups : []
      image_id                 = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].image_id : null
      instance_charge_type     = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].instance_charge_type : null
      instance_type            = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].instance_type : null
      internet_max_bandwidth_out = length(data.alicloud_instances.instances_ds[*]) > 0 ? data.alicloud_instances.instances_ds[0].instances[0].internet_max_bandwidth_out : null
      amount                   = var.NumberOfClonedEcs
      password                 = var.LoginPassword
      system_disk_category     = length(data.alicloud_ecs_disks.ecs_disk_ds[*]) > 0 ? data.alicloud_ecs_disks.ecs_disk_ds[0].disks[0].category : null
      system_disk_size         = length(data.alicloud_ecs_disks.ecs_disk_ds[*]) > 0 ? data.alicloud_ecs_disks.ecs_disk_ds[0].disks[0].size : null
    }

  output.tf: |+
    output "new_disk_id" {
      value = local.create_new_disk ? length(alicloud_ecs_disk.clone_ecs_disk[*].id) > 0 ? alicloud_ecs_disk.clone_ecs_disk[*].id : null : null
    }
    
    output "new_ecs_ids" {
      value = local.create_new_ecs_instance ? length(alicloud_ecs_instance_set.ecs_instance_group[*].id) > 0 ? alicloud_ecs_instance_set.ecs_instance_group[*].instance_ids : null : null
    }

