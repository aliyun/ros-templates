ROSTemplateFormatVersion: '2015-09-01'
Transform: Aliyun::Terraform-v1.5
Parameters:
  vswitch_zone_id:
    Type: String
    Label:
      en: VSwitch Availability Zone
      zh-cn: 交换机可用区
    Description:
      en: Availability Zone ID,<br><b>note： <font color='blue'>Before selecting, please
        confirm that the Availability Zone supports the specification of creating
        ECS resources</font></b>
      zh-cn: 可用区ID，<br><b>注： <font color='blue'>选择可用区前请确认该可用区是否支持创建ECS资源的规格</font></b>
    AssociationProperty: ALIYUN::ECS::Instance:ZoneId
  ecs_image_id:
    Type: String
    Label:
      en: Image ID
      zh-cn: 镜像ID
    Description:
      en: 'Instance Image ID. see detail: <b><a href=''https://www.alibabacloud.com/help/doc-detail/112977.html''
        target=''_blank''><font color=''blue''>Find the mirror</font></a></b>'
      zh-cn: 实例镜像，详见：<b><a href='https://help.aliyun.com/document_detail/112977.html'
        target='_blank'><font color='blue'>查找镜像</font></a></b>
    AssociationProperty: ALIYUN::ECS::Image::ImageId
    AssociationPropertyMetadata:
      InstanceType: ${ecs_instance_type}
      SupportedImageOwnerAlias:
        - system
        - self
        - others
  ecs_instance_type:
    Type: String
    Label:
      en: Instance Type
      zh-cn: 实例规格
    Description:
      en: <font color='blue'><b>1.Before selecting the model please confirm that the
        current available zone under the model is in stock, some models need to be
        reported in advance</b></font><br><font color='blue'><b>2.List of optional
        models</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB Intranet
        bandwidth1Gbps In-grid sending and receiving packages30MillionPPS</font>]<br></b>[ecs.c5.xlarge
        <font color='green'>4vCPU 8GiB Intranet bandwidth1.5Gbps In-grid sending and
        receiving packages50MillionPPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU
        16GiB Intranet bandwidth2.5Gbps In-grid sending and receiving packages80MillionPPS</font>]
      zh-cn: <font color='blue'><b>1.选择机型前请先确认当前可用区下该机型是否有货，部分机型需要提前报备</b></font><br><font
        color='blue'><b>2.可选机型列表</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU
        4GiB 内网带宽1Gbps 内网收发包30万PPS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU
        8GiB 内网带宽1.5Gbps 内网收发包50万PPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU
        16GiB 内网带宽2.5Gbps 内网收发包80万PPS</font>]
    AssociationProperty: ALIYUN::ECS::Instance::InstanceType
    AssociationPropertyMetadata:
      ZoneId: vswitch_zone_id
  ecs_system_disk_category:
    Type: String
    Label:
      en: System Disk Type
      zh-cn: 系统盘类型
    Description:
      en: '<font color=''blue''><b>Optional values:</b></font><br>[cloud_efficiency:
        <font color=''green''>Efficient Cloud Disk</font>]<br>[cloud_ssd: <font color=''green''>SSD
        Cloud Disk</font>]<br>[cloud_essd: <font color=''green''>ESSD Cloud Disk</font>]<br>[cloud:
        <font color=''green''>Cloud Disk</font>]<br>[ephemeral_ssd: <font color=''green''>Local
        SSD Cloud Disk</font>]'
      zh-cn: '<font color=''blue''><b>可选值：</b></font><br>[cloud_efficiency: <font
        color=''green''>高效云盘</font>]<br>[cloud_ssd: <font color=''green''>SSD云盘</font>]<br>[cloud_essd:
        <font color=''green''>ESSD云盘</font>]<br>[cloud: <font color=''green''>普通云盘</font>]<br>[ephemeral_ssd:
        <font color=''green''>本地SSD盘</font>]'
    AssociationProperty: ALIYUN::ECS::Disk::SystemDiskCategory
    AssociationPropertyMetadata:
      LocaleKey: DiskCategory
      InstanceType: ${ecs_instance_type}
  ecs_system_disk_size:
    Type: Number
    Label:
      en: System Disk Space
      zh-cn: 系统盘空间
    Description:
      en: 'System disk size, range of values: 40-500, units: GB.'
      zh-cn: 系统盘大小, 取值范围：[40, 500], 单位：GB。
    Default: 40
  ecs_password:
    Type: String
    NoEcho: true
    Label:
      en: Instance Password
      zh-cn: 实例密码
    Description:
      en: Server login password, Length 8-30, must contain three(Capital letters,
        lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol
        in).
      zh-cn: 服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    ConstraintDescription:
      en: Length 8-30, must contain three(Capital letters, lowercase letters, numbers,
        ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).
      zh-cn: 长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。
    AssociationProperty: 'ALIYUN::ECS::Instance::Password'
Metadata:
  ALIYUN::ROS::Interface:
    ParameterGroups:
      - Parameters:
          - vswitch_zone_id
        Label:
          default:
            en: VPC
            zh-cn: 专有网络
      - Parameters:
          - ecs_instance_type
          - ecs_image_id
          - ecs_system_disk_category
          - ecs_system_disk_size
          - ecs_password
        Label:
          default:
            en: ECS
            zh-cn: 云服务器
    TemplateTags:
      - acs:example:网络:创建绑定了多个私网地址的ECS
Workspace:
  main.tf: |+
    resource "alicloud_vpc" "ecs_vpc" {
          cidr_block = "192.168.0.0/16"
        }

        resource "alicloud_eip" "eip" {
          payment_type = "PayAsYouGo"
          internet_charge_type = "PayByTraffic"
        }

        resource "alicloud_vswitch" "ecs_vswitch" {
          zone_id = var.vswitch_zone_id
          cidr_block = "192.168.0.0/24"
          vpc_id = alicloud_vpc.ecs_vpc.id
        }

        resource "alicloud_ecs_network_interface" "EcsENI" {
          vswitch_id = alicloud_vswitch.ecs_vswitch.id
          security_group_ids = [alicloud_security_group.ecs_security_group.id]
        }

        resource "alicloud_security_group" "ecs_security_group" {
          vpc_id = alicloud_vpc.ecs_vpc.id
        }

        resource "alicloud_instance" "ecs_instance" {
          image_id = var.ecs_image_id
          allocate_public_ip = false
          password = var.ecs_password
          instance_charge_type = "PostPaid"
          instance_type = var.ecs_instance_type
          system_disk_size = var.ecs_system_disk_size
          vswitch_id = alicloud_vswitch.ecs_vswitch.id
          system_disk_category = var.ecs_system_disk_category
          security_groups = [alicloud_security_group.ecs_security_group.id]
        }

        resource "alicloud_network_interface" "ecs_eni" {
          vswitch_id          = alicloud_vswitch.ecs_vswitch.id
          security_group_ids  = [alicloud_security_group.ecs_security_group.id]
        }

        resource "alicloud_eip_association" "eip_association" {
          allocation_id = alicloud_eip.eip.id
          instance_id   = alicloud_network_interface.ecs_eni.id
          mode          = "NAT"
          instance_type = "NetworkInterface"

          depends_on = [alicloud_instance.ecs_instance]
        }

        resource "alicloud_network_interface_attachment" "ecs_eni_attachment" {
          instance_id          = alicloud_instance.ecs_instance.id
          network_interface_id = alicloud_network_interface.ecs_eni.id

          depends_on = [alicloud_eip_association.eip_association]
        }
  variable.tf: |-
    variable "vswitch_zone_id" {
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "VSwitch Availability Zone",
          "zh-cn": "交换机可用区"
        },
        "Description": {
          "en": "Availability Zone ID,<br><b>note： <font color='blue'>Before selecting, please confirm that the Availability Zone supports the specification of creating ECS resources</font></b>",
          "zh-cn": "可用区ID，<br><b>注： <font color='blue'>选择可用区前请确认该可用区是否支持创建ECS资源的规格</font></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId"
      }
      EOT
    }
    
    variable "ecs_image_id" {
      type = string
      default = "centos_7_04_64_20G_alibase_201701015.vhd"
      description = <<EOT
      {
        "Label": {
          "en": "Image ID",
          "zh-cn": "镜像ID"
        },
        "Description": {
          "en": "Instance Image ID. see detail: <b><a href='https://www.alibabacloud.com/help/doc-detail/112977.html' target='_blank'><font color='blue'>Find the mirror</font></a></b>",
          "zh-cn": "实例镜像，详见：<b><a href='https://help.aliyun.com/document_detail/112977.html' target='_blank'><font color='blue'>查找镜像</font></a></b>"
        },
        "AssociationProperty": "ALIYUN::ECS::Image::ImageId",
        "AssociationPropertyMetadata": {
          "InstanceType": "ecs_instance_type",
          "SupportedImageOwnerAlias": [
            "system",
            "self",
            "others"
          ]
        }
      }
      EOT
    }
    
    variable "ecs_instance_type" {
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "Instance Type",
          "zh-cn": "实例规格"
        },
        "Description": {
          "en": "<font color='blue'><b>1.Before selecting the model please confirm that the current available zone under the model is in stock, some models need to be reported in advance</b></font><br><font color='blue'><b>2.List of optional models</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB Intranet bandwidth1Gbps In-grid sending and receiving packages30MillionPPS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU 8GiB Intranet bandwidth1.5Gbps In-grid sending and receiving packages50MillionPPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU 16GiB Intranet bandwidth2.5Gbps In-grid sending and receiving packages80MillionPPS</font>]",
          "zh-cn": "<font color='blue'><b>1.选择机型前请先确认当前可用区下该机型是否有货，部分机型需要提前报备</b></font><br><font color='blue'><b>2.可选机型列表</font><br></b></font>[ecs.c5.large <font color='green'>2vCPU 4GiB 内网带宽1Gbps 内网收发包30万PPS</font>]<br></b>[ecs.c5.xlarge <font color='green'>4vCPU 8GiB 内网带宽1.5Gbps 内网收发包50万PPS</font>]<br></b>[ecs.c5.2xlarge <font color='green'>8vCPU 16GiB 内网带宽2.5Gbps 内网收发包80万PPS</font>]"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::InstanceType",
        "AssociationPropertyMetadata": {
          "ZoneId": "vswitch_zone_id"
        }
      }
      EOT
    }
    
    variable "ecs_system_disk_category" {
      type = string
      description = <<EOT
      {
        "Label": {
          "en": "System Disk Type",
          "zh-cn": "系统盘类型"
        },
        "Description": {
          "en": "<font color='blue'><b>Optional values:</b></font><br>[cloud_efficiency: <font color='green'>Efficient Cloud Disk</font>]<br>[cloud_ssd: <font color='green'>SSD Cloud Disk</font>]<br>[cloud_essd: <font color='green'>ESSD Cloud Disk</font>]<br>[cloud: <font color='green'>Cloud Disk</font>]<br>[ephemeral_ssd: <font color='green'>Local SSD Cloud Disk</font>]",
          "zh-cn": "<font color='blue'><b>可选值：</b></font><br>[cloud_efficiency: <font color='green'>高效云盘</font>]<br>[cloud_ssd: <font color='green'>SSD云盘</font>]<br>[cloud_essd: <font color='green'>ESSD云盘</font>]<br>[cloud: <font color='green'>普通云盘</font>]<br>[ephemeral_ssd: <font color='green'>本地SSD盘</font>]"
        },
        "AssociationProperty": "ALIYUN::ECS::Disk::SystemDiskCategory",
        "AssociationPropertyMetadata": {
          "LocaleKey": "DiskCategory",
          "InstanceType": "ecs_instance_type"
        }
      }
      EOT
    }
    
    variable "ecs_system_disk_size" {
      default = 40
      type = number
      description = <<EOT
      {
        "Label": {
          "en": "System Disk Space",
          "zh-cn": "系统盘空间"
        },
        "Description": {
          "en": "System disk size, range of values: 40-500, units: GB.",
          "zh-cn": "系统盘大小, 取值范围：[40, 500], 单位：GB。"
        }
      }
      EOT
    }
    
    variable "ecs_password" {
      type = string
      description = <<EOT
      {
        "NoEcho": true,
        "Label": {
          "en": "Instance Password",
          "zh-cn": "实例密码"
        },
        "Description": {
          "en": "Server login password, Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).",
          "zh-cn": "服务器登录密码,长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
        },
        "ConstraintDescription": {
          "en": "Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).",
          "zh-cn": "长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
        },
        "AssociationProperty": "ALIYUN::ECS::Instance::Password"
      }
      EOT
    }

  output.tf: |+
    output "EIP" {
      description = "弹性公网 IP 地址"
      value       = alicloud_eip.eip.ip_address
    }
    
    output "InstanceId" {
      description = "ECS 实例 ID"
      value       = alicloud_instance.ecs_instance.id
    }
    
    output "PrimaryPrivateIPAddress" {
      description = "实例主私网 IP 地址"
      value       = alicloud_instance.ecs_instance.private_ip
    }
    
    
