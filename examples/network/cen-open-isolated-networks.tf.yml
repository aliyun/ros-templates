  variable.tf: |+
      variable "ZoneId1" {
        type        = string
        description = <<EOT
        {
          "Label": {
            "en": "Zone ID",
            "zh-cn": "可用区ID，选择创建交换机1，3，5的可用区（需要指定与交换机2，4，6不同可用区）"
          },
          "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId"
        }
        EOT
      }
      
      variable "ZoneId2" {
        type        = string
        description = <<EOT
        {
          "Label": {
            "en": "Zone ID",
            "zh-cn": "可用区ID，选择创建交换机2，4，6的可用区（需要指定与交换机1，3，5不同可用区）"
          },
          "AssociationProperty": "ALIYUN::ECS::Instance:ZoneId"
        }
        EOT
      }
      
      variable "InstanceChargeType" {
        type        = string
        default     = "PostPaid"
        description = <<EOT
        {
          "Label": {
            "en": "ECS Instance Billing Method",
            "zh-cn": "ECS实例的付费模式"
          },
          "AssociationPropertyMetadata": {
            "LocaleKey": "InstanceChargeType"
          },
          "AllowedValues": [
            "PostPaid",
            "PrePaid"
          ]
        }
        EOT
      }
      
      variable "EcsPeriodUnit" {
        type        = string
        default     = "Week"
        description = <<EOT
        {
          "Label": {
            "en": "ECS Purchase cycle of prepaid resources",
            "zh-cn": "云服务器预付费资源的购买周期"
          },
          "AssociationPropertyMetadata": {
            "Visible": {
              "Condition": {
                "Fn::Not": {
                  "Fn::Equals": [
                    "$${InstanceChargeType}",
                    "PostPaid"
                  ]
                }
              }
            }
          },
          "AllowedValues": [
            "Week",
            "Month"
          ]
        }
        EOT
      }
      
      variable "EcsPeriod" {
        type        = number
        default     = 1
        description = <<EOT
        {
          "Label": {
            "en": "ECS Purchase duration of prepaid resources",
            "zh-cn": "云服务器预付费资源的购买时长"
          },
          "Description": {
            "en": "When the purchase cycle of prepaid resource is week, the value range is: [1,2,3,4]; when the purchase cycle of prepaid resource is month, the value is: [1,2,3,4,5,6,7,8,9,12,24,36,48,60]<br>",
            "zh-cn": "云服务器预付费资源的购买时长，当预付费资源的购买周期为Week时，取值范围：[1，2，3，4]; 当预付费资源的购买周期为Month时，取值：[1，2，3，4，5，6，7，8，9，12，24，36，48，60]<br>"
          },
          "AssociationPropertyMetadata": {
            "Visible": {
              "Condition": {
                "Fn::Not": {
                  "Fn::Equals": [
                    "$${InstanceChargeType}",
                    "PostPaid"
                  ]
                }
              }
            }
          },
          "AllowedValues": [
            1,
            2,
            3,
            4,
            5,
            6,
            7,
            8,
            9,
            12,
            24,
            36,
            48,
            60
          ]
        }
        EOT
      }
      
      variable "InstancePassword" {
        type        = string
        sensitive   = true
        description = <<EOT
        {
          "Label": {
            "en": "Instance Password",
            "zh-cn": "实例密码"
          },
          "Description": {
            "en": "The 8-30 long login password of instance, consists of the uppercase, lowercase letter and number. <br> special characters include()`~!@#$%^&*_-+=|{}[]:;'<>,.?/",
            "zh-cn": "长度8-30，必须包含大写字母、小写字母、数字、特殊符号三个；<br>特殊字符包括：()`~!@#$%^&*_-+=|{}[]:;'<>,.?/"
          },
          "ConstraintDescription": {
            "en": "Length 8-30, must contain three(Capital letters, lowercase letters, numbers, ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ Special symbol in).",
            "zh-cn": "长度8-30，必须包含三项（大写字母、小写字母、数字、 ()`~!@#$%^&*_-+=|{}[]:;'<>,.?/ 中的特殊符号）。"
          },
          "AllowedPattern": "[0-9A-Za-z\\_\\-&:;'<>,=%`~!@#\\(\\)\\$\\^\\*\\+\\|\\{\\}\\[\\]\\.\\?\\/]+$",
          "MinLength": "8",
          "MaxLength": "30"
        }
        EOT
      }
      
